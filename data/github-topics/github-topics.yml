markdown: >-
  ## Overview


  GitHub Topics is GitHub's built-in system for discovering repositories
  organized by topics, technologies, and themes.


  ## Popular Topics


  - **awesome**: All awesome lists

  - **javascript**, **python**, **go**: Language-specific

  - **react**, **vue**, **angular**: Framework repos

  - **machine-learning**, **ai**: AI/ML projects

  - **devops**, **kubernetes**: Infrastructure


  ## Features


  - Topic-based browsing

  - Trending repositories

  - Star counts

  - Language filtering

  - Updated dates

  - Related topics


  ## Discovery Methods


  - Browse by topic

  - See trending projects

  - Explore related topics

  - Filter by language

  - Sort by stars/activity


  ## Use Cases


  - Find awesome lists

  - Discover libraries

  - Explore frameworks

  - Research technologies

  - Track trends


  ## Examples


  - github.com/topics/awesome

  - github.com/topics/machine-learning

  - github.com/topics/react

  - github.com/topics/devops


  ## Target Audience


  Developers discovering open-source projects, libraries, and resources
  organized by topic.


  ## Pricing


  Free to browse.

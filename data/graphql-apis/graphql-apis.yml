markdown: >-
  ## Overview


  GraphQL APIs is a collective GitHub repository curated by APIs-guru that
  maintains a comprehensive list of free, public GraphQL APIs available for
  developers to use in projects, demos, and learning.


  ## Featured APIs


  ### Entertainment & Media

  - **Pokémon API**: Comprehensive data about Pokémon, items, and regions

  - **Star Wars API (SWAPI)**: Information about older Star Wars movies

  - **Anime & Manga**: Data about anime series and manga

  - **Spotify API**: Music data and playback control


  ### Space & Science

  - **SpaceX API**: Information about launches, rockets, and astronauts

  - **Countries API**: Query data about countries, continents, and languages


  ### Sports & Gaming

  - **UFC API**: Mixed martial arts data

  - **Pokémon TCG**: Trading card game information


  ### Financial

  - **Foreign Exchange Rates**: Currency conversion data


  ## Benefits of Using GraphQL


  - **Precise Queries**: Request exactly the data you need

  - **Single Endpoint**: One endpoint for all data needs

  - **Strongly Typed**: Built-in schema validation

  - **Fewer Requests**: Fetch related data in a single query

  - **Better Developer Experience**: Introspection and documentation


  ## Use Cases


  - Building demo applications

  - Learning GraphQL concepts

  - Prototyping new features

  - Educational projects

  - Portfolio projects

  - Testing GraphQL tools and libraries


  ## Developer Resources


  The repository serves as a central hub for discovering GraphQL APIs, making it
  easier for developers to find and integrate real-world GraphQL endpoints
  without having to search individually.


  ## Target Audience


  Developers learning GraphQL, building prototypes, creating demo applications,
  or needing real data for development and testing.


  ## Pricing


  Free collection of public APIs. Individual APIs may have their own rate limits
  or usage terms.

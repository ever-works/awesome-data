markdown: >-
  ## Overview


  Awesome Design Resources List provides a comprehensive collection of design
  tools, resources, articles, and inspiration sources across all design
  disciplines.


  ## Design Systems


  ### Component Libraries

  - **Material Design** - Google's design language

  - **Ant Design** - Enterprise UI design

  - **Carbon Design** - IBM design system

  - **Primer** - GitHub design system

  - **Polaris** - Shopify design system


  ### Design System Tools

  - Storybook - Component development

  - Figma - Design file organization

  - Zeroheight - Documentation platform

  - Style Dictionary - Design tokens


  ## Newsletters


  ### Design News

  - **Sidebar** - Five best design links daily

  - **UX Collective** - Weekly UX insights

  - **Dense Discovery** - Design and tech curation

  - **Hey Designer** - Weekly design newsletter

  - **UI Sources** - Weekly UI/UX inspiration


  ### Industry Updates

  - Smashing Magazine newsletter

  - A List Apart digest

  - Designer News weekly


  ## Articles & Blogs


  ### Leading Publications

  - **Medium Design** - Design articles on Medium

  - **Smashing Magazine** - Web design and development

  - **A List Apart** - Web design standards

  - **CSS-Tricks** - Front-end development and design

  - **Codrops** - Web design experiments


  ### UX Resources

  - Nielsen Norman Group articles

  - UX Matters

  - UX Planet

  - UX Booth


  ## Design Tools


  ### UI/UX Design

  - Figma - Collaborative design

  - Sketch - Mac design tool

  - Adobe XD - Design and prototype

  - Framer - Interactive design

  - Penpot - Open source design


  ### Graphics & Illustration

  - Adobe Illustrator

  - Affinity Designer

  - Procreate (iPad)

  - Vectornator


  ### Animation

  - After Effects

  - Principle

  - Lottie

  - Rive


  ## Free Resources


  ### Stock Photos

  - Unsplash - Free high-res photos

  - Pexels - Free stock photos and videos

  - Pixabay - Free images and videos

  - Burst (Shopify) - Free stock photos


  ### Illustrations

  - **unDraw** - Open source illustrations

  - **DrawKit** - Beautiful vector illustrations

  - **Humaaans** - Mix-and-match characters

  - **Open Doodles** - Free sketchy illustrations

  - **Blush** - Customizable illustrations


  ### Icons

  - Heroicons - Beautiful SVG icons

  - Feather Icons - Simple icons

  - Ionicons - Premium icons

  - Material Symbols - Google icons

  - Phosphor Icons - Flexible icon family


  ### Fonts

  - Google Fonts - Free web fonts

  - Font Squirrel - Free commercial fonts

  - DaFont - Large font collection

  - FontShare - Quality free fonts


  ## Inspiration


  ### Showcase Sites

  - **Dribbble** - Design community

  - **Behance** - Creative portfolios

  - **Awwwards** - Website awards

  - **SiteInspire** - Web design showcase

  - **Httpster** - Design inspiration


  ### Specific Categories

  - **Mobbin** - Mobile app design

  - **Screenlane** - Mobile UI inspiration

  - **Land-book** - Landing pages

  - **Footer** - Website footers

  - **Call to Idea** - UI interaction patterns


  ## Color & Typography


  ### Color Tools

  - Coolors - Color palette generator

  - Adobe Color - Color wheel

  - Paletton - Color scheme designer

  - Color Hunt - Color palettes


  ### Typography

  - Type Scale - Preview font scales

  - Fontjoy - Font pairing generator

  - FontPair - Google Font pairings

  - Typewolf - Font inspiration


  ## Learning Resources


  - Interaction Design Foundation courses

  - Coursera design specializations

  - Skillshare creative classes

  - YouTube design channels

  - Design books and ebooks


  ## Features


  - Comprehensive resource coverage

  - Free and paid tools

  - Active newsletters

  - Inspiration sources

  - Learning materials

  - Design system examples


  ## Use Cases


  - Daily design inspiration

  - Finding design tools

  - Learning design skills

  - Building resource library

  - Staying updated with trends

  - Free asset discovery


  ## Pricing


  Mostly free resources. Paid tools:

  - Figma: Free tier, Professional $12-15/editor/month

  - Adobe Creative Cloud: $54.99/month

  - Skillshare: $32/month or $168/year

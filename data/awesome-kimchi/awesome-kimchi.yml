markdown: >-
  ## Overview


  Awesome Kimchi is a GitHub repository that aims to archive all types of kimchi
  "for the people, by the people, of the people" with the tagline "Kimchi of the
  people, by the people, for the people, shall not perish from the earth."


  ## Features


  - **Comprehensive Kimchi Varieties**: Documents various types including white
  kimchi (without chili pepper powder), pickled mustard leaves and stems, and
  Kkakdugi (using Korean white radish)

  - **Cultural Preservation**: Archives traditional Korean fermented food
  recipes and variations

  - **Community-Driven**: Open for contributions from kimchi enthusiasts
  worldwide

  - **Educational Resource**: Information about health benefits including
  anti-inflammatory, antibacterial, antioxidant, anticancer, and probiotic
  properties


  ## About Kimchi


  Kimchi is one of the most popular Korean traditional fermented foods,
  possessing numerous health benefits including anti-obesity properties,
  cholesterol reduction, and anti-aging effects. This repository celebrates the
  diversity and cultural significance of this traditional food.



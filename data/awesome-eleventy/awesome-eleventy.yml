markdown: >-
  ## Overview


  Awesome Eleventy provides resources for Eleventy (11ty), the simpler static
  site generator.


  ## What is Eleventy?


  A simpler static site generator with flexible templating and zero client-side
  JavaScript by default.


  ## Key Features


  - **Template Agnostic** - Use any templating language

  - **Zero Config** - Works out of the box

  - **Data Driven** - Flexible data cascade

  - **Fast Builds** - Incrementalbuilds

  - **No Client JS** - Optional JavaScript


  ## Supported Templates


  - Nunjucks

  - Liquid

  - Markdown

  - JavaScript

  - HTML

  - Pug

  - Handlebars


  ## Plugins


  - Navigation

  - RSS feed

  - Syntax highlighting

  - Image optimization

  - Critical CSS


  ## Starter Templates


  - Blogs

  - Documentation sites

  - Portfolios

  - Business websites


  ## Use Cases


  - Blogs and content sites

  - Documentation

  - Marketing sites

  - JAMstack applications


  ## Pricing


  Free and open-source generator.

markdown: >-
  ## Overview


  Awesome Cloud Security provides comprehensive resources for securing cloud
  infrastructure across AWS, Azure, and GCP.


  ## Categories Covered


  - **Cloud Security Tools**
    - Security Monkey - Monitors AWS, GCP, OpenStack for assets and changes
    - ScoutSuite - Multi-cloud security auditing tool
    - Prowler - AWS security assessment tool
    - CloudSploit - Cloud security configuration scanner

  - **Security Domains**
    - Identity and Access Management (IAM)
    - Network security
    - Data encryption
    - Logging and monitoring
    - Compliance and governance

  ## AWS Security


  - IAM best practices

  - S3 bucket security

  - EC2 hardening

  - VPC security groups

  - CloudTrail logging

  - GuardDuty threat detection


  ## Azure Security


  - Azure AD security

  - Network Security Groups

  - Storage account security

  - Azure Security Center

  - Key Vault management


  ## GCP Security


  - Cloud IAM policies

  - VPC firewall rules

  - Cloud Storage security

  - Security Command Center

  - Cloud KMS encryption


  ## Key Topics


  - Cloud security architecture

  - Threat modeling

  - Penetration testing

  - Incident response

  - Compliance frameworks (CIS, NIST)


  ## Use Cases


  - Security assessments

  - Compliance auditing

  - Penetration testing

  - Security hardening

  - Threat detection


  ## Pricing


  Free and open-source tool collection.

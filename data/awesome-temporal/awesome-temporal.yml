markdown: >-
  ## Overview


  Awesome Temporal provides resources for Temporal, the open-source platform for
  orchestrating durable workflows.


  ## What is Temporal?


  Temporal is a scalable and reliable runtime for durable workflow execution,
  ensuring that workflows continue to completion even if failures occur.


  ## Key Features


  - **Durable Execution** - Workflows survive failures

  - **Reliable** - Built-in retries and error handling

  - **Scalable** - Handles millions of workflows

  - **Version Safe** - Deploy code without breaking running workflows

  - **Observable** - Built-in visibility and monitoring


  ## SDKs Available


  - **TypeScript** - Node.js SDK

  - **Go** - Go SDK

  - **Java** - Java SDK

  - **Python** - Python SDK

  - **PHP** - PHP SDK

  - **.NET** - .NET SDK


  ## Use Cases


  - **Order Processing** - E-commerce workflows

  - **Data Pipelines** - ETL orchestration

  - **Batch Jobs** - Long-running tasks

  - **Saga Patterns** - Distributed transactions

  - **Notifications** - Reliable delivery

  - **Subscriptions** - Recurring workflows


  ## Integrations


  - Kubernetes deployment

  - Prometheus monitoring

  - DataDog integration

  - Grafana dashboards


  ## Pricing


  Free and open-source. Temporal Cloud has usage-based pricing.

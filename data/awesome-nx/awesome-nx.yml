markdown: >-
  ## Overview


  Awesome Nx provides resources for Nx, the smart and extensible build
  framework.


  ## What is Nx?


  A smart, fast and extensible build system with first-class monorepo support
  and powerful integrations.


  ## Key Features


  - **Computation Caching** - Never rebuild the same code twice

  - **Distributed Task Execution** - Run tasks across machines

  - **Code Generation** - Scaffolding with schematics

  - **Dependency Graph** - Visual workspace relationships

  - **Plugin Ecosystem** - Extensible architecture


  ## Supported Frameworks


  - React

  - Angular

  - Next.js

  - Remix

  - Vue

  - Svelte

  - React Native

  - Node.js


  ## Official Plugins


  - @nx/react

  - @nx/angular

  - @nx/next

  - @nx/node

  - @nx/nest

  - @nx/express


  ## Key Capabilities


  - Monorepo management

  - Code generation

  - Testing integration

  - Build optimization

  - Deployment automation


  ## Use Cases


  - Enterprise monorepos

  - Micro-frontend architecture

  - Full-stack development

  - Design systems


  ## Pricing


  Free and open-source. Nx Cloud has free and paid tiers.

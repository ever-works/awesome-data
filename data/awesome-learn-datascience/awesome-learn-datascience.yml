markdown: >-
  ## Overview


  Awesome Learn Datascience provides beginner-friendly resources for learning
  data science from the ground up, with a focus on practical skills and hands-on
  projects.


  ## Python Fundamentals


  ### Getting Started

  - Python basics for data science

  - Setting up development environment

  - Jupyter Notebook introduction

  - IPython interactive computing


  ### Essential Libraries

  - **NumPy** - Numerical computing

  - **pandas** - Data manipulation and analysis

  - **Matplotlib** - Data visualization

  - **Seaborn** - Statistical visualization


  ## Data Manipulation


  ### pandas Tutorials

  - DataFrame operations

  - Data cleaning and preprocessing

  - Merging and joining datasets

  - Grouping and aggregation

  - Time series analysis


  ### Data Wrangling

  - Handling missing data

  - Data type conversions

  - Feature engineering

  - Data transformation


  ## Machine Learning


  ### scikit-learn

  - Supervised learning algorithms

  - Unsupervised learning

  - Model selection and evaluation

  - Cross-validation

  - Hyperparameter tuning


  ### Algorithms

  - Linear and logistic regression

  - Decision trees and random forests

  - Support vector machines

  - K-means clustering

  - Dimensionality reduction


  ## Data Visualization


  ### Tools

  - **Matplotlib** - Foundational plotting library

  - **Seaborn** - Statistical visualizations

  - **Plotly** - Interactive plots

  - **Bokeh** - Interactive visualization library


  ### Best Practices

  - Choosing appropriate charts

  - Color theory and accessibility

  - Dashboard creation

  - Storytelling with data


  ## Statistics & Math


  ### Fundamentals

  - Probability theory

  - Descriptive statistics

  - Inferential statistics

  - Hypothesis testing

  - Regression analysis


  ### Linear Algebra

  - Vectors and matrices

  - Matrix operations

  - Eigenvalues and eigenvectors


  ### Calculus

  - Derivatives

  - Gradients

  - Optimization


  ## Learning Paths


  ### Beginner Projects

  - Exploratory data analysis (EDA)

  - Predictive modeling

  - Data visualization dashboards

  - Classification problems

  - Regression analysis


  ### Online Courses

  - Coursera data science specializations

  - DataCamp interactive courses

  - Kaggle Learn tutorials

  - Fast.ai practical deep learning


  ### Books

  - Python for Data Analysis by Wes McKinney

  - Hands-On Machine Learning by Aurélien Géron

  - Introduction to Statistical Learning

  - Data Science from Scratch


  ## Datasets


  - **Kaggle** - Competition datasets

  - **UCI ML Repository** - Classic datasets

  - **Data.gov** - Government data

  - **Google Dataset Search** - Dataset discovery


  ## Tools & Environment


  ### IDEs & Notebooks

  - Jupyter Notebook/Lab

  - VS Code with Python

  - Google Colab

  - PyCharm


  ### Version Control

  - Git and GitHub for data science

  - DVC (Data Version Control)

  - Experiment tracking


  ## Features


  - Beginner-focused content

  - Hands-on learning approach

  - Project-based tutorials

  - Progressive skill building

  - Free learning resources

  - Active community support


  ## Use Cases


  - Learning data science from scratch

  - Transitioning to data science career

  - Academic coursework

  - Personal projects

  - Portfolio building

  - Interview preparation


  ## Pricing


  Mostly free resources:

  - Free: YouTube, Kaggle, many blog tutorials

  - Affordable: DataCamp ($25-39/month), Coursera ($49/month)

  - Books: $30-60

  - University courses: Variable

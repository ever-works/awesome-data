name: Awesome DevOps
description: A curated list of awesome software for DevOps including Meshery for
  cloud-native infrastructure management, configuration management tools like
  Ansible, and comprehensive DevOps toolchains.
source_url: https://github.com/awesome-soft/awesome-devops
category: DevOps & SRE
tags:
  - devops
  - automation
  - infrastructure

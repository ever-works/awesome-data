markdown: >-
  ## Overview


  Awesome Documentation Resources provides templates, tools, guides, and
  examples for creating effective software documentation.


  ## Documentation Types


  ### API Documentation

  - OpenAPI/Swagger specifications

  - API reference generators

  - Interactive documentation

  - Code examples


  ### User Documentation

  - Getting started guides

  - Tutorials and how-tos

  - User manuals

  - FAQs


  ### Developer Documentation

  - Architecture overviews

  - Contributing guides

  - Code documentation

  - Setup instructions


  ## Tools


  ### Static Site Generators

  - Docusaurus

  - MkDocs

  - Jekyll

  - Hugo


  ### API Documentation

  - Swagger UI

  - Redoc

  - Slate

  - API Blueprint


  ### Diagramming

  - Mermaid

  - PlantUML

  - Draw.io

  - Lucidchart


  ## Templates


  - README templates

  - API documentation templates

  - Architecture decision records

  - Contributing guidelines


  ## Best Practices


  - Write for your audience

  - Keep it up-to-date

  - Use examples

  - Make it searchable

  - Version your documentation


  ## Style Guides


  - Google Developer Documentation Style Guide

  - Microsoft Writing Style Guide

  - Apple Style Guide

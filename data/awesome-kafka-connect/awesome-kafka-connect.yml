markdown: >-
  ## Overview


  Awesome Kafka Connect is a curated repository of Kafka Connect connectors for
  integrating Apache Kafka with databases, message brokers, cloud services, and
  enterprise systems.


  ## Featured Connectors


  ### Message Broker Connectors

  - Generic JMS source and sink

  - IBM MQ connector

  - ActiveMQ integration

  - TIBCO EMS connector

  - Solace PubSub

  - RabbitMQ connector


  ### Database Connectors

  - JDBC source and sink

  - Debezium CDC connectors

  - MongoDB connector

  - Elasticsearch sink

  - PostgreSQL, MySQL connectors


  ### Cloud Service Connectors

  - S3 sink connector

  - BigQuery connector

  - Snowflake connector

  - Azure connectors

  - GCP connectors


  ## Use Cases


  - Database CDC (Change Data Capture)

  - Message broker integration

  - Cloud data warehouse loading

  - Log shipping to analytics

  - Cross-system data sync


  ## Target Audience


  Data engineers and platform teams integrating Kafka with existing enterprise
  systems and cloud services.


  ## Pricing


  Free collection. Individual connectors vary (open-source and commercial).

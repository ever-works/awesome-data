markdown: >-
  ## Overview


  Awesome Cypress provides comprehensive resources for Cypress, the modern web
  testing framework.


  ## What is Cypress?


  A next generation front end testing tool built for the modern web. Fast, easy
  and reliable testing for anything that runs in a browser.


  ## Key Features


  - **Time Travel** - Debug with snapshots

  - **Real-time Reloads** - Automatic test reload

  - **Automatic Waiting** - No sleep or wait commands needed

  - **Network Stubbing** - Control network requests

  - **Screenshots & Videos** - Automatic capture

  - **Debuggability** - Readable errors and stack traces


  ## Testing Types


  - E2E testing

  - Component testing

  - API testing

  - Visual testing

  - Accessibility testing


  ## Popular Plugins


  - cypress-axe - Accessibility testing

  - cypress-testing-library - Testing Library integration

  - cypress-real-events - Real browser events

  - cypress-file-upload - File upload support

  - cypress-image-snapshot - Visual regression


  ## CI Integration


  - GitHub Actions

  - GitLab CI

  - CircleCI

  - Azure Pipelines

  - Jenkins


  ## Use Cases


  - End-to-end testing

  - Integration testing

  - Component testing

  - Visual regression testing


  ## Pricing


  Free open-source framework. Cypress Cloud has free and paid tiers.

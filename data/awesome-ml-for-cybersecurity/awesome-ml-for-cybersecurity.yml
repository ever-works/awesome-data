name: Awesome ML for Cybersecurity
description: A curated list of amazingly awesome tools and resources related to
  the use of machine learning for cybersecurity. Includes datasets from DARPA,
  ADFA, NSL-KDD, research papers on malware detection, DDoS prevention, and
  intrusion detection systems.

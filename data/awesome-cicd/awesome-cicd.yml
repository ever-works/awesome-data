markdown: >-
  ## Overview


  Awesome CI/CD provides a comprehensive collection of Continuous Integration
  and Continuous Delivery tools and resources for automating software
  development workflows.


  ## Popular CI/CD Platforms


  - **Jenkins** - Open-source automation server

  - **GitLab CI** - Integrated CI/CD in GitLab

  - **GitHub Actions** - Native GitHub automation

  - **CircleCI** - Cloud-based CI/CD platform

  - **Travis CI** - Continuous integration service

  - **Drone CI** - Container-native CI/CD built on Docker


  ## Categories Covered


  - **Build Tools** - Maven, Gradle, npm, Webpack

  - **Testing Frameworks** - Unit testing, integration testing, e2e testing

  - **Deployment Tools** - Kubernetes, Docker, Ansible

  - **Monitoring** - Performance monitoring and logging

  - **Security** - SAST, DAST, dependency scanning


  ## Key Features


  - Automated build pipelines

  - Continuous testing

  - Deployment automation

  - Environment management

  - Artifact management

  - Notification systems


  ## Best Practices


  - Pipeline as code

  - Automated testing at every stage

  - Fast feedback loops

  - Immutable infrastructure

  - Blue-green deployments

  - Canary releases


  ## Use Cases


  - Automated software delivery

  - Quality assurance automation

  - Infrastructure as code deployment

  - Microservices deployment

  - Multi-environment management


  ## Pricing


  Free curated list. Individual platforms have varying pricing models.

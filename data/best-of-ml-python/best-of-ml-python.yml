markdown: >-
  ## Overview


  Best of ML Python is a ranked, curated list of awesome machine learning Python
  libraries that is updated weekly with quality metrics.


  ## Featured Libraries


  - **graph-nets** - DeepMind's library for building graph networks in
  TensorFlow

  - **jraph** - JAX library for graph neural networks

  - **PyTorch Geometric** - Geometric deep learning with PyTorch

  - **DGL** - Deep Graph Library for graph neural networks


  ## Categories Covered


  - **Machine Learning Frameworks**
    - TensorFlow, PyTorch, JAX
    - scikit-learn, XGBoost, LightGBM
    - Keras, fastai

  - **Data Processing**
    - pandas, NumPy, Polars
    - Dask for distributed computing
    - Vaex for big data

  - **Visualization**
    - Matplotlib, Seaborn, Plotly
    - Altair, Bokeh
    - TensorBoard, Weights & Biases

  - **Model Deployment**
    - ONNX, TensorFlow Serving
    - TorchServe, BentoML
    - Seldon Core

  ## Ranking Criteria


  - GitHub stars and activity

  - PyPI download statistics

  - Community engagement

  - Documentation quality

  - Maintenance status

  - Update frequency


  ## Key Features


  - Weekly updates

  - Quality rankings

  - Trending projects

  - Category organization

  - Project metrics and stats


  ## Use Cases


  - Discovering ML libraries

  - Choosing between alternatives

  - Staying updated with ecosystem

  - Project evaluation

  - Technology selection


  ## Pricing


  Free curated and ranked list, updated weekly.

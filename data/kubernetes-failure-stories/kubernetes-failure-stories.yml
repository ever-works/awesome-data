markdown: >-
  ## Overview


  Kubernetes Failure Stories compiles public failure and horror stories related
  to Kubernetes to help SRE, Ops, and platform/infrastructure teams learn from
  others and reduce unknown unknowns of running Kubernetes in production.


  ## Features


  - **Real Production Incidents**: Stories from major companies including
  Datadog, Spotify, and Moonlight

  - **Detailed Postmortems**: Analysis of what went wrong and lessons learned

  - **Diverse Failure Modes**: Covers etcd, CoreDNS, AWS, GKE, and other
  Kubernetes components

  - **Conference Talks**: Links to presentations like Spotify's "How Spotify
  Accidentally Deleted All its Kube Clusters with No User Impact"

  - **Community Contributions**: Open for submissions of public failure stories


  ## Notable Examples


  - Datadog's "10 Ways to Shoot Yourself in the Foot with Kubernetes"

  - Moonlight's "All pods scheduled to same failing host" with 100% traffic loss

  - Various AWS and GKE production incident reports


  ## Purpose


  Makes it easier for Kubernetes operators to learn from real-world failures,
  understand potential failure modes, and implement better practices in their
  own deployments.


  ## Pricing


  Free and open-source resource list.

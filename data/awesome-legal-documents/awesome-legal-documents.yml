markdown: >-
  ## Overview


  Awesome Legal Documents provides a curated list of free legal document
  templates and resources that companies can use for their business operations,
  covering everything from open source licenses to privacy policies and
  employment agreements.


  ## Key Categories


  - **Open Source Licenses** - Various OSI-approved licenses for software
  projects

  - **Privacy Policies** - Templates for GDPR, CCPA, and general privacy
  compliance

  - **Terms of Service** - User agreement templates for websites and
  applications

  - **Employment Documents** - Offer letters, NDAs, and contractor agreements

  - **Business Agreements** - Vendor agreements, partnership documents

  - **Intellectual Property** - Copyright notices, patent disclosures


  ## Featured Resources


  - MIT, Apache, GPL and other open source licenses

  - GDPR-compliant privacy policy templates

  - Terms of service for SaaS applications

  - Employee agreement templates

  - Contributor license agreements (CLAs)

  - Cookie policy templates


  ## Benefits


  - Free and openly available documents

  - Community-reviewed templates

  - Save legal costs for startups

  - Standardized legal language

  - Easy to customize for your needs


  ## Important Note


  While these templates are useful starting points, companies should consult
  with qualified legal professionals to ensure documents meet their specific
  needs and comply with applicable laws.


  ## Pricing


  Free and open source (GitHub repository)

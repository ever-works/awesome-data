markdown: >-
  ## Overview


  Pull Request Review Guide provides guidelines for better, faster pull request
  reviews through collaborative conversation and trade-offs.


  ## For Authors


  ### Creating Good Pull Requests

  - Keep PRs small and focused (single purpose)

  - Write clear descriptions

  - Include context and reasoning

  - Add screenshots for UI changes

  - Self-review before requesting review

  - Respond promptly to feedback


  ### PR Description Template

  - What: Summary of changes

  - Why: Motivation and context

  - How: Technical approach

  - Testing: How it was tested

  - Screenshots: Visual changes


  ## For Reviewers


  ### Effective Review Process

  - Review promptly

  - Start with understanding the context

  - Check out the branch locally when needed

  - Comment on positives, not just negatives

  - Be constructive and kind

  - Suggest alternatives

  - Ask questions instead of demanding changes


  ### What to Look For

  - Correctness and functionality

  - Code quality and readability

  - Test coverage

  - Performance implications

  - Security vulnerabilities

  - Documentation


  ## Best Practices


  - Automate what you can (linting, formatting)

  - Use PR templates

  - Set up CI/CD checks

  - Review in multiple passes

  - Separate must-have from nice-to-have feedback

  - Follow up on discussions


  ## Communication


  - Be respectful and professional

  - Assume positive intent

  - Explain the "why" behind suggestions

  - Use conventional comment prefixes (nit:, question:, suggestion:)


  ## Common Pitfalls


  - Nitpicking on style (automate this)

  - Requesting changes without explanation

  - Leaving PRs unreviewed for days

  - Being too perfectionist

  - Not testing the changes

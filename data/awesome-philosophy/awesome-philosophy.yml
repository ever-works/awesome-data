markdown: >-
  ## Overview


  Awesome Philosophy is a comprehensive collection of philosophical resources,
  featuring works from major thinkers throughout history, covering all major
  branches of philosophy from metaphysics to ethics to epistemology.


  ## Key Categories


  - **Ancient Philosophy** - Plato, Aristotle, Socrates, Stoics, Epicureans

  - **Medieval Philosophy** - Augustine, Aquinas, Avicenna, Maimonides

  - **Modern Philosophy** - Descartes, Hume, Kant, Hegel, Nietzsche

  - **Contemporary Philosophy** - 20th and 21st century philosophical works

  - **Eastern Philosophy** - Buddhist, Confucian, Taoist traditions

  - **Philosophy of Mind** - Consciousness, perception, cognition

  - **Ethics** - Moral philosophy and ethical theories

  - **Epistemology** - Theory of knowledge


  ## Major Philosophers


  ### Classical Era

  - Plato - Theory of Forms, Republic, dialogues

  - Aristotle - Logic, ethics, metaphysics, politics

  - Socrates - Socratic method, virtue ethics


  ### Enlightenment

  - Immanuel Kant - Critique of Pure Reason, categorical imperative

  - David Hume - Empiricism, skepticism

  - René Descartes - Rationalism, "I think therefore I am"


  ### Modern Era

  - Friedrich Nietzsche - Will to power, perspectivism

  - Søren Kierkegaard - Existentialism, leap of faith

  - Karl Marx - Historical materialism, critique of capitalism


  ## Branches of Philosophy


  - **Metaphysics** - Nature of reality and existence

  - **Epistemology** - Theory of knowledge and belief

  - **Ethics** - Moral philosophy and values

  - **Logic** - Reasoning and argumentation

  - **Aesthetics** - Philosophy of art and beauty

  - **Political Philosophy** - Government, justice, rights

  - **Philosophy of Science** - Scientific method and knowledge

  - **Philosophy of Language** - Meaning, reference, truth


  ## Learning Resources


  - Free online philosophy courses

  - Stanford Encyclopedia of Philosophy

  - Internet Encyclopedia of Philosophy

  - Philosophy podcasts and lectures

  - Academic journals and papers


  ## Pricing


  Free and open source (GitHub repository)

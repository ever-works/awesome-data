markdown: >-
  ## Overview


  Awesome Startup Stack showcases what tech stacks indie hackers and startups
  are using for their applications, with explanations of why these choices work
  well for early-stage companies.


  ## Popular Tech Stacks


  ### The Lean Stack

  **Focus**: Speed to market, low cost


  **Frontend**

  - **Next.js** - React framework with SSR

  - **Tailwind CSS** - Utility-first styling

  - **Vercel** - Instant deployment


  **Backend**

  - **Next.js API Routes** - Serverless functions

  - **Supabase** - Backend as a service

  - **Prisma** - Type-safe ORM


  **Why it works**: Fast development, minimal ops, generous free tiers


  ### The Modern Stack

  **Focus**: Developer experience, type safety


  **T3 Stack**

  - **Next.js** - React framework

  - **TypeScript** - Type safety

  - **tRPC** - End-to-end typesafe APIs

  - **Tailwind CSS** - Styling

  - **Prisma** - Database ORM

  - **NextAuth** - Authentication


  **Why it works**: Full type safety, great DX, scalable


  ### The Proven Stack

  **Focus**: Maturity, hiring, resources


  - **React** - UI library

  - **Node.js/Express** - Backend

  - **PostgreSQL** - Database

  - **AWS** - Infrastructure

  - **Docker** - Containerization


  **Why it works**: Battle-tested, large talent pool, abundant resources


  ## Frontend Frameworks


  ### React Ecosystem

  - **Next.js** - Most popular for startups

  - **Remix** - Fast, focused on web standards

  - **Create React App** - Classic React starter

  - **Vite + React** - Fast build tool


  ### Vue Ecosystem

  - **Nuxt 3** - Vue framework

  - **Vite + Vue** - Modern setup


  ### Alternative Frameworks

  - **SvelteKit** - Svelte framework

  - **Solid Start** - Solid.js framework

  - **Astro** - Content-focused sites


  ## Backend Options


  ### Node.js Frameworks

  - **Next.js API Routes** - Integrated backend

  - **Fastify** - High performance

  - **NestJS** - Enterprise TypeScript

  - **tRPC** - Typesafe APIs


  ### Other Languages

  - **Go** - Microservices, CLI tools

  - **Python/FastAPI** - ML/AI, data processing

  - **Ruby on Rails** - Rapid development

  - **Laravel** - PHP framework


  ## Databases


  ### SQL

  - **PostgreSQL** - Most popular for startups

  - **PlanetScale** - Serverless MySQL

  - **Supabase** - Postgres with realtime

  - **Railway** - Managed Postgres


  ### NoSQL

  - **MongoDB** - Document database

  - **Firebase** - Realtime database

  - **DynamoDB** - AWS NoSQL


  ## Infrastructure


  ### Hosting Platforms


  **Serverless/PaaS**

  - **Vercel** - Frontend + serverless

  - **Netlify** - JAMstack hosting

  - **Railway** - Full-stack platform

  - **Render** - Web services

  - **Fly.io** - Global app platform


  **Traditional**

  - **AWS** - Full cloud platform

  - **Google Cloud** - GCP services

  - **DigitalOcean** - Simple cloud

  - **Hetzner** - Affordable VPS


  ### Why Startups Choose Them

  - **Vercel**: Fast deploys, great DX, free tier

  - **Railway**: Database + app hosting, simple pricing

  - **AWS**: Scalable, comprehensive, startup credits

  - **DigitalOcean**: Simple, affordable, predictable


  ## Authentication


  - **Clerk** - Complete user management

  - **NextAuth** - Open source auth for Next.js

  - **Supabase Auth** - Built-in authentication

  - **Auth0** - Enterprise auth

  - **Firebase Auth** - Google authentication


  ## Payments


  - **Stripe** - Most popular payment processor

  - **Paddle** - Merchant of record (handles taxes)

  - **Lemon Squeezy** - Easy payments for digital products

  - **PayPal** - Wide acceptance


  ## Analytics & Monitoring


  ### Analytics

  - **Plausible** - Privacy-first, simple

  - **PostHog** - Product analytics

  - **Mixpanel** - User analytics

  - **Google Analytics** - Free, comprehensive


  ### Error Tracking

  - **Sentry** - Error monitoring

  - **LogRocket** - Session replay

  - **BugSnag** - Error tracking


  ## Email Services


  - **Resend** - Email API for developers

  - **SendGrid** - Email delivery

  - **Postmark** - Transactional email

  - **Mailgun** - Email automation


  ## Decision Factors


  ### For Solo Founders

  - Minimize operational complexity

  - Generous free tiers

  - Quick to market

  - Single-person maintainability


  ### For Small Teams

  - Developer experience

  - Type safety and testing

  - Scalability path

  - Team familiarity


  ### For Growing Startups

  - Hiring pool availability

  - Ecosystem maturity

  - Migration paths

  - Enterprise readiness


  ## Features


  - Real-world stack examples

  - Reasoning behind choices

  - Trade-off analysis

  - Cost considerations

  - Scaling paths

  - Migration strategies


  ## Use Cases


  - Choosing initial tech stack

  - Evaluating alternatives

  - Planning for scale

  - Reducing infrastructure costs

  - Improving developer experience

  - Technology decision-making


  ## Pricing Considerations


  - **Free tiers**: Vercel, Supabase, PlanetScale (generous)

  - **Pay-as-you-go**: AWS, Stripe (scales with usage)

  - **Flat rate**: Railway, Render (predictable costs)

  - **Startup credits**: AWS, GCP (up to $100K)

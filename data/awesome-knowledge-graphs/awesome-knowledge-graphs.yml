markdown: >-
  ## Overview


  Awesome Knowledge Graphs is a comprehensive resource for learning about and
  working with knowledge graphs, graph databases, and semantic technologies for
  organizing and querying interconnected data.


  ## Graph Databases


  ### Native Graph Databases

  - **Neo4j**: Leading native graph database with Cypher query language

  - **Dgraph**: Fast, distributed graph database designed for real-time query
  execution

  - **TigerGraph**: Scalable graph database for enterprise analytics

  - **ArcadeDB**: Multi-model database supporting graph, document, and key-value

  - **Memgraph**: High-performance in-memory graph database


  ### Multi-Model Databases

  - **ArangoDB**: Native multi-model database with graph capabilities

  - **OrientDB**: Distributed multi-model database

  - **JanusGraph**: Distributed graph database optimized for storing and
  querying large graphs

  - **Stardog**: Enterprise knowledge graph platform


  ## Query Languages


  ### Graph Query Languages

  - **Cypher**: Neo4j's declarative graph query language

  - **Gremlin**: Apache TinkerPop graph traversal language

  - **SPARQL**: RDF query language for semantic web

  - **GraphQL**: Query language for APIs


  ## Knowledge Graph Construction


  ### Entity Extraction and Linking

  - Named Entity Recognition (NER) tools

  - Entity linking and disambiguation

  - Relationship extraction

  - Coreference resolution


  ### Ontology Engineering

  - **Protégé**: Ontology editor and knowledge management system

  - **WebProtégé**: Web-based collaborative ontology development

  - **TopBraid Composer**: Enterprise-level semantic modeling

  - OWL and RDFS ontology languages


  ### Knowledge Extraction

  - Information extraction from unstructured text

  - Triple extraction tools

  - Automatic knowledge base construction

  - Web scraping for knowledge graphs


  ## Knowledge Graph Embedding


  - **TransE**: Translational embedding models

  - **RotatE**: Rotation-based embeddings

  - **ComplEx**: Complex-valued embeddings

  - **DistMult**: Bilinear diagonal model

  - **ConvE**: Convolutional knowledge graph embeddings


  ## Applications


  ### Question Answering

  - Knowledge graph-based QA systems

  - Natural language to SPARQL/Cypher

  - Conversational search

  - Semantic search engines


  ### Recommendation Systems

  - Graph-based recommendation algorithms

  - Collaborative filtering with knowledge graphs

  - Explainable recommendations


  ### Knowledge Graph Reasoning

  - Rule-based reasoning

  - Probabilistic reasoning

  - Fuzzy logic for uncertainty

  - Temporal reasoning


  ## GraphRAG and LLMs


  ### Graph-Augmented Generation

  - **Microsoft GraphRAG**: Knowledge graph construction for RAG

  - **Neo4j GraphRAG**: Integration with large language models

  - Graph-based retrieval for LLMs

  - Knowledge-enhanced generation


  ### LLM Integration

  - Extracting knowledge graphs from LLMs

  - Using KGs to ground LLM outputs

  - Fact-checking with knowledge graphs

  - Structured data from unstructured text


  ## Semantic Web Technologies


  ### RDF and Linked Data

  - Resource Description Framework (RDF)

  - RDF Schema (RDFS)

  - Web Ontology Language (OWL)

  - Linked Open Data principles

  - SPARQL endpoints


  ### Triple Stores

  - **Apache Jena**: Java framework for semantic web applications

  - **RDF4J**: Eclipse framework for RDF and SPARQL

  - **Blazegraph**: High-performance graph database

  - **Virtuoso**: Hybrid database with RDF support


  ## Visualization


  - Graph visualization libraries

  - Interactive graph explorers

  - Knowledge graph browsers

  - Schema visualization tools


  ## Enterprise Solutions


  - Knowledge graph platforms for enterprises

  - Master data management with graphs

  - 360-degree view of customers

  - Fraud detection using graph patterns

  - Supply chain optimization


  ## Industry Applications


  - **Healthcare**: Medical knowledge graphs, drug discovery

  - **Finance**: Risk modeling, fraud detection

  - **E-commerce**: Product recommendations, search

  - **Social Networks**: Social graph analysis

  - **Life Sciences**: Protein interactions, genomics


  ## Resources


  - Academic papers on knowledge graphs

  - Tutorials and courses

  - Conferences (KGC, ISWC, ESWC)

  - Books on graph databases and semantic web

  - Datasets and benchmarks

markdown: >-
  ## Overview


  Awesome Copilots catalogs AI-powered assistants and copilots across different
  domains, helping users find the right AI tools to enhance their workflows.


  ## Coding Assistants


  ### GitHub Copilot

  AI pair programmer from GitHub/OpenAI integrated into various IDEs.


  ### Amazon CodeWhisperer

  AWS's code completion service with security scanning.


  ### Tabnine

  AI code completion supporting multiple languages and private models.


  ### Codeium

  Free AI-powered code acceleration with chat functionality.


  ### Cursor

  AI-first code editor built on VS Code.


  ## Writing Assistants


  - **Grammarly**: Grammar and writing enhancement

  - **Jasper AI**: Content generation

  - **Copy.ai**: Marketing copy creation

  - **Notion AI**: Integrated writing assistant


  ## Design Assistants


  - **Figma AI**: Design suggestions

  - **Adobe Sensei**: Creative workflows

  - **Uizard**: UI design from sketches


  ## Data & Analytics


  - **Julius AI**: Data analysis

  - **Rows**: Spreadsheet AI assistant

  - **DataRobot**: AutoML platform


  ## Productivity Tools


  - **Motion**: AI calendar and task management

  - **Reclaim.ai**: Intelligent scheduling

  - **Superhuman**: Email with AI features


  ## Development Operations


  - **Kubiya**: DevOps workflows

  - **Bito**: CLI and IDE assistant

  - **Pieces**: Developer workflow AI


  ## Specialized Domains


  ### Healthcare

  - Medical coding assistants

  - Clinical decision support

  - Documentation automation


  ### Legal

  - Contract review

  - Legal research

  - Document drafting


  ### Sales & Marketing

  - Email generation

  - Sales forecasting

  - Customer insights


  ## Selection Criteria


  - Domain specificity

  - Integration capabilities

  - Privacy and security

  - Pricing model

  - Customization options


  ## Future Trends


  - More specialized vertical copilots

  - Better context awareness

  - Multi-modal interactions

  - Enterprise features

  - Open source alternatives

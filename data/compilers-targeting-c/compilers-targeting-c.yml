markdown: >-
  ## Overview


  Compilers Targeting C is a curated list of open source compilers that can
  generate C (or in some cases, C++) code, serving as an intermediate
  representation for various programming languages.


  ## Features


  - **Multi-Language Support**: Compilers from Scheme, OCaml, Haskell, and many
  other languages to C

  - **Diverse Approaches**: Source-to-source compilers, bytecode compilers, and
  specialized tools

  - **Neural Network Tools**: C99 code generators for neural network inference

  - **Language Bridges**: Tools like Clue targeting Lua, JavaScript, Perl 5, and
  other languages


  ## Notable Projects


  - **CHICKEN Scheme**: R7RS Scheme compiler using "Cheney on the M.T.A." with
  native threads

  - **BlitzMax**: Monkey-derived compiler to C transpiler

  - **OCamlCC**: Compiles OCaml bytecode to C

  - **C-Mera**: S-expression to C-family language source-to-source compiler

  - **LLVM C backend**: Resurrected LLVM backend for C generation


  ## Use Cases


  - Cross-compilation and portability

  - Performance optimization through C compilation

  - Legacy system integration

  - Embedded systems development


  ## Pricing


  Free and open-source resource list.

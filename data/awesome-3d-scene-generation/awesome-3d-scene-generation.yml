markdown: >-
  ## Overview


  A comprehensive collection of 3D scene generation research papers, tools, and
  resources. Covers techniques for generating realistic 3D environments from
  text descriptions, images, or procedural methods.


  ## Scene Types


  ### Indoor Scenes


  - Room layout generation

  - Furniture placement

  - Object arrangement

  - Interior design automation

  - Residential and commercial spaces


  ### Outdoor Scenes


  - Urban environments and cityscapes

  - Natural landscapes

  - Parks and gardens

  - Road networks

  - Terrain generation


  ### City-Scale Generation


  - Building generation

  - Street network planning

  - Infrastructure placement

  - Population distribution

  - Traffic simulation


  ## Generation Methods


  ### Learning-Based


  - Text-to-3D scene generation

  - Image-to-3D scene reconstruction

  - Diffusion models for scenes

  - Neural scene representations

  - Generative models (GANs, VAEs)


  ### Procedural Generation


  - Grammar-based systems

  - L-systems for vegetation

  - Noise-based terrain

  - Rule-based city generation


  ### Hybrid Approaches


  - AI-assisted procedural generation

  - Learning from procedural data

  - Guided generation systems


  ## Recent Projects (2025-2026)


  - **SceneFoundry** - Generating Interactive Infinite 3D Worlds (AAAI 2026)

  - City-scale world generation systems

  - Real-time procedural environments

  - Multiplayer world generation


  ## Applications


  - Video game development

  - Virtual reality environments

  - Architectural visualization

  - Urban planning

  - Film and animation pre-visualization

  - Metaverse platforms

  - Simulation environments


  ## Key Technologies


  - Neural radiance fields (NeRF)

  - 3D Gaussian splatting

  - Signed distance functions (SDFs)

  - Occupancy networks

  - Mesh generation algorithms


  ## Datasets


  - 3D-FRONT - Indoor scenes

  - Replica - Photorealistic indoor spaces

  - Matterport3D - Real-world scans

  - ScanNet - RGB-D indoor scans


  ## Pricing


  Free and open-source research papers and tools.

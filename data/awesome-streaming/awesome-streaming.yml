markdown: >-
  ## Overview


  Awesome Streaming is a curated list of frameworks, tools, and resources for
  building streaming data processing applications and real-time data pipelines.


  ## Stream Processing Frameworks


  - **Apache Flink** - Distributed stream processing framework with exactly-once
  semantics and low-latency processing

  - **Apache Kafka Streams** - Lightweight stream processing library for
  building real-time applications

  - **Apache Spark Streaming** - Micro-batch stream processing as part of the
  Apache Spark ecosystem

  - **Apache Samza** - Stream processing framework with deep Kafka integration

  - **RisingWave** - PostgreSQL-compatible streaming database for building
  event-driven applications and real-time ETL pipelines


  ## Python Libraries


  - **Faust** - Stream processing library porting Kafka Streams concepts to
  Python

  - **Quix Streams** - Python library for high-volume time-series streaming

  - **Bytewax** - Python stream processing with Rust performance

  - **Pathway** - Python ETL framework with Rust engine for real-time processing


  ## Features


  - Real-time data processing and analytics

  - Stateful stream processing

  - Event time processing and windowing

  - Exactly-once semantics

  - Fault tolerance and scalability

  - Integration with various data sources and sinks


  ## Use Cases


  - Real-time analytics dashboards

  - Event-driven architectures

  - Continuous ETL pipelines

  - Fraud detection and anomaly detection

  - IoT data processing

  - Click stream analysis


  ## Pricing


  Most frameworks are free and open source under Apache 2.0 or similar licenses.
  Managed services like Confluent Cloud offer free trials with usage-based
  pricing.

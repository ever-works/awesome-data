markdown: >-
  ## Overview


  Awesome Synthesis is a focused collection of software, tools, and educational
  resources specifically for learning audio synthesis, from fundamental concepts
  to advanced sound design techniques.


  ## Key Categories


  - **Synthesis Fundamentals** - Basic concepts and terminology

  - **Synthesis Types** - Subtractive, additive, FM, wavetable, granular

  - **Modular Synthesis** - Virtual modular environments

  - **Learning Software** - Interactive tools for understanding synthesis

  - **Sound Design** - Techniques and workflows

  - **Educational Resources** - Tutorials, courses, and documentation


  ## Types of Synthesis


  ### Subtractive Synthesis

  - Oscillators generating harmonically rich waveforms

  - Filters removing frequencies

  - Classic analog synthesis approach

  - Examples: Minimoog, Prophet-5 emulations


  ### FM Synthesis

  - Frequency modulation for complex timbres

  - Operator-based architecture

  - Examples: DX7 emulations, FM8


  ### Wavetable Synthesis

  - Morphing between different waveforms

  - Modern digital synthesis approach

  - Examples: Serum, Vital, Massive


  ### Additive Synthesis

  - Building sounds from sine wave harmonics

  - Precise spectral control

  - Examples: Harmor, Razor


  ### Granular Synthesis

  - Creating textures from tiny sound grains

  - Experimental sound design

  - Examples: Granite, Quanta


  ## Virtual Modular Software


  - **VCV Rack** - Free, open-source virtual modular synthesizer

  - **Reaktor** - Modular synthesis and sound design platform

  - **Max/MSP** - Visual programming for music and multimedia

  - **Pure Data** - Open-source visual programming language

  - **Softube Modular** - Eurorack-style virtual modular


  ## Learning Resources


  ### Interactive Learning

  - Syntorial - Ear training for synthesis

  - Learning Synths by Ableton - Free interactive website

  - Patch storage and preset analysis


  ### Tutorials & Courses

  - Sound design fundamentals

  - Synthesis technique breakdowns

  - Genre-specific sound design

  - Modular patching tutorials


  ### Books & Documentation

  - Synthesis manuals and guides

  - Sound design theory

  - Technical synthesis documentation


  ## Sound Design Workflows


  1. Understanding the source material

  2. Selecting appropriate synthesis method

  3. Programming oscillators and modulators

  4. Shaping with filters and envelopes

  5. Adding effects and processing

  6. Fine-tuning and saving presets


  ## Pricing


  Free and open source (GitHub repository)

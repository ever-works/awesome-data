markdown: >-
  ## Overview


  Awesome Databases is a comprehensive collection of database systems, tools,
  and resources covering both SQL and NoSQL databases.


  ## Features


  - **Relational Databases**: PostgreSQL, MySQL, MariaDB, SQLite

  - **Document Databases**: MongoDB, CouchDB, RavenDB

  - **Key-Value Stores**: Redis, Memcached, etcd

  - **Graph Databases**: Neo4j, ArangoDB, OrientDB

  - **Time-Series**: InfluxDB, TimescaleDB, Prometheus

  - **Multi-Model**: ArangoDB supporting multiple data models

  - **NewSQL**: CockroachDB, TiDB, YugabyteDB

  - **Embedded**: SQLite, RocksDB, LevelDB


  ## Database Categories


  - Relational (SQL) databases

  - Document stores

  - Key-value stores

  - Column-family stores

  - Graph databases

  - Time-series databases

  - Search engines

  - Multi-model databases

  - In-memory databases


  ## Notable Databases


  - **Redis**: In-memory data structure store

  - **MongoDB**: Popular document database

  - **PostgreSQL**: Advanced open-source relational DB

  - **Neo4j**: Leading graph database

  - **InfluxDB**: Time-series database

  - **ArangoDB**: Multi-model database (graph, document, key-value)


  ## Tools & Utilities


  - Database clients and GUIs

  - Migration tools

  - Backup solutions

  - Monitoring and profiling

  - Query optimization

  - Data modeling tools


  ## Protocols Supported


  - SQL standard

  - MongoDB protocol

  - Redis protocol

  - Cypher (Neo4j)

  - Gremlin (graph)

  - HTTP/JSON APIs


  ## Use Cases


  - Application data storage

  - Caching and sessions

  - Analytics and reporting

  - Graph relationships

  - Time-series data

  - Real-time applications

  - Search and indexing


  ## Pricing


  Free and open-source repository featuring both open-source and commercial
  databases.

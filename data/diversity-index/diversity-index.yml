markdown: >-
  ## Overview


  Diversity Index is a curated list of grants, scholarships, travel bursary and
  financial aid offered to women from around the world by conferences and
  companies sponsoring education to encourage diversity in STEM fields.


  ## Features


  - **Comprehensive Scholarship Database**: General grants and awards for Women
  in STEM

  - **Post-Doctoral Support**: Research grants and fellowships for graduate
  studies

  - **Conference Funding**: Travel grants and financial aid for attending
  conferences and meetups

  - **Internship Opportunities**: Full-time scholarships (3+ months) for FOSS
  projects

  - **Global Reach**: Opportunities available worldwide regardless of location

  - **Diversity Tracking**: Index of women attending or speaking at tech events


  ## Notable Programs


  - ACM-W: Support for undergraduate and graduate women attending research
  conferences

  - GeekFeminism: Travel and attendance funding database

  - Various company-sponsored diversity scholarships

  - Conference-specific financial aid programs


  ## Categories


  - di-awards.md: Grants and awards

  - di-conf-events.md: Conference attendance tracking

  - di-internships.md: Internship and fellowship opportunities


  ## Pricing


  Free and open-source resource list.

markdown: >-
  ## Overview


  Awesome Falsehood is a curated list of articles about common falsehoods and
  misconceptions that programmers believe across numerous technical domains.


  ## Features


  - **Comprehensive Coverage**: Falsehood articles about time, dates, names,
  addresses, geography, e-commerce, authorization, cars, quantum technology,
  Ethereum, and more

  - **Educational Value**: Helps developers understand pitfalls in unfamiliar
  domains

  - **Myth Dispelling**: Points out inconsistencies, subtleties, and edge cases

  - **Community Contributions**: Open for submissions of new falsehood articles

  - **Concise Format**: Tersely written for quick consumption


  ## Popular Categories


  - Time and dates (seminal articles on temporal logic)

  - Names and personal information

  - Addresses and geography

  - E-commerce: prices, currencies, inventory

  - Authorization and permissions

  - Cars and vehicles

  - Quantum technology

  - Blockchain and cryptocurrency


  ## Purpose


  Falsehood articles provide a convenient written form to approach unfamiliar
  domains by highlighting common pitfalls, showing inconsistencies, and
  revealing subtleties that developers often overlook.


  ## Pricing


  Free and open-source resource list.

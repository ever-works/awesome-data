markdown: >-
  ## Overview


  Awesome Embedded provides comprehensive resources for embedded systems
  programming on resource-constrained devices.


  ## Real-Time Operating Systems (RTOS)


  - **FreeRTOS** - Most popular RTOS for microcontrollers

  - **Zephyr** - Scalable RTOS for connected devices

  - **RIOT** - Friendly RTOS for IoT

  - **Mbed OS** - ARM's IoT operating system

  - **NuttX** - Mature RTOS emphasizing standards compliance

  - **Azure RTOS** - Microsoft's embedded RTOS


  ## Microcontroller Platforms


  - **ARM Cortex-M** - Industry-standard MCU architecture

  - **ESP32** - WiFi/Bluetooth microcontroller

  - **STM32** - ST's ARM-based MCUs

  - **AVR** - Arduino-compatible microcontrollers

  - **PIC** - Microchip's microcontroller family

  - **RISC-V** - Open-source processor architecture


  ## Development Tools


  - **Cross-compilers** - GCC ARM, Keil, IAR

  - **Debuggers** - J-Link, ST-Link, OpenOCD

  - **IDEs** - STM32CubeIDE, Keil µVision, MPLAB X

  - **Build systems** - CMake, Make, PlatformIO


  ## Libraries & Frameworks


  - HAL (Hardware Abstraction Layer) libraries

  - Communication protocols (UART, SPI, I2C, CAN)

  - Wireless stacks (BLE, WiFi, LoRa)

  - Sensor drivers

  - File systems (FatFS, LittleFS)


  ## Key Topics


  - Interrupt handling

  - Power management

  - Memory optimization

  - Real-time constraints

  - Hardware debugging

  - Bootloaders


  ## Use Cases


  - IoT device development

  - Industrial automation

  - Consumer electronics

  - Automotive systems

  - Medical devices


  ## Pricing


  Free and open-source resource collection.

markdown: >-
  ## Overview


  Awesome Urban Planning Resources is a registered awesome-list providing a
  community-driven collection of data and technology resources for urban and
  regional planning professionals, researchers, and enthusiasts. Maintained by
  the APA Technology Division.


  ## Core Resources


  ### Transit Planning

  References to **awesome-transit**, a comprehensive collection of transit data
  tools and resources for analyzing public transportation systems.


  ### Micromobility

  Links to **micromobility-tools-and-resources** covering bike-sharing,
  e-scooters, and other emerging transportation modes.


  ### Sustainability

  Includes **awesome-sustainable-technology** for environmentally-focused urban
  development tools.


  ## Tool Categories


  ### Planning Software

  - GIS platforms and spatial analysis tools

  - Urban design and visualization software

  - Transportation modeling systems

  - Land use planning tools

  - Community engagement platforms


  ### Data Sources

  - Census and demographic data

  - Zoning and land use databases

  - Transportation networks

  - Environmental data

  - Economic indicators


  ### Analysis Methods

  - Accessibility analysis

  - Network analysis

  - Spatial statistics

  - Scenario planning

  - Impact assessment


  ## Professional Development


  - Educational resources for planners

  - Certification and training programs

  - Professional organizations

  - Conferences and workshops

  - Research publications


  ## Emerging Technologies


  - Smart city platforms

  - Digital twins for urban planning

  - Machine learning for prediction

  - Real-time data analytics

  - Participatory planning tools


  ## Built Environment Focus


  Covers comprehensive aspects of the built environment:

  - Housing and development

  - Transportation infrastructure

  - Public spaces and parks

  - Utilities and services

  - Community facilities


  ## Target Audience


  - Professional urban and regional planners

  - City officials and policymakers

  - Academic researchers

  - Students in planning programs

  - Community advocates

  - Technology developers


  ## Community Collaboration


  As a community list, contributions are welcome from practitioners and
  researchers working to improve urban environments through technology and
  data-driven approaches.


  ## Related Standards


  References industry standards and best practices from organizations like the
  American Planning Association (APA) and other professional bodies.


  ## Licensing


  Open source community resource promoting knowledge sharing in urban planning.

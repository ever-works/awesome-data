markdown: >-
  ## Overview


  Awesome Weekly Robotics showcases projects and innovations featured in the
  Weekly Robotics newsletter, providing curated robotics content.


  ## Drone Autopilot Software


  - **ArduPilot** - Open source autopilot for multirotors, fixed wings, rovers,
  boats, and submarines

  - **PX4** - Open source flight control software for drones and other unmanned
  vehicles

  - **Betaflight** - Flight controller firmware for racing drones

  - **iNav** - Navigation-focused flight controller software


  ## Featured Projects


  - Autonomous vehicles and robots

  - Robotic manipulation systems

  - Humanoid and legged robots

  - Aerial robots and drones

  - Underwater robots (ROVs, AUVs)

  - Agricultural robotics


  ## Newsletter Topics


  - **Hardware Projects** - New robot designs and builds

  - **Software Tools** - Robotics software and frameworks

  - **Research** - Academic robotics research

  - **Companies** - Robotics startups and products

  - **Events** - Conferences and competitions


  ## Categories Covered


  - Mobile robotics

  - Industrial automation

  - Service robots

  - Research platforms

  - Hobby robotics

  - Open-source projects


  ## Key Features


  - Weekly curated content

  - Project highlights

  - Industry news

  - Research summaries

  - Community spotlight


  ## Use Cases


  - Staying updated with robotics

  - Finding inspiration for projects

  - Discovering new tools and frameworks

  - Learning about industry trends

  - Networking with robotics community


  ## Pricing


  Free curated project list from newsletter.

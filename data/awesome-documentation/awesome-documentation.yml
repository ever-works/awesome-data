markdown: >-
  ## Overview


  Awesome Documentation provides comprehensive resources for software
  documentation, including ready-to-use templates, practical tools, established
  standards, and real-world examples to help teams create and maintain
  high-quality documentation.


  ## Key Categories


  - **Templates** - Out-of-the-box templates for various documentation types

  - **Documentation Tools** - Software for creating and maintaining docs

  - **Style Guides & Standards** - Industry-standard documentation practices

  - **DocOps** - Documentation operations and workflows

  - **Real-World Examples** - Production documentation from successful projects

  - **Localization** - Multi-language documentation guides


  ## Featured Templates


  - API documentation templates

  - User guide templates

  - README templates

  - Architecture decision records (ADR)

  - Release notes templates

  - Contributing guidelines


  ## Documentation Tools


  ### Static Site Generators

  - Docusaurus - Documentation websites powered by React

  - MkDocs - Fast, simple documentation generator

  - Sphinx - Python documentation generator

  - VuePress - Vue-powered static site generator


  ### API Documentation

  - Swagger/OpenAPI - API documentation standard

  - Redoc - OpenAPI documentation generator

  - Postman - API documentation platform


  ### Diagramming

  - Mermaid - Markdown-based diagrams

  - PlantUML - Text-based UML diagrams

  - Draw.io - Visual diagramming tool


  ## DocOps Resources


  - Documentation as code practices

  - CI/CD for documentation

  - Documentation testing strategies

  - Version control for docs

  - Automated documentation updates


  ## Best Practices


  - Consistency through templates and style guides

  - Automation for efficiency

  - User-focused documentation

  - Regular updates and maintenance

  - Collaborative documentation workflows


  ## Pricing


  Free and open source (GitHub repository)

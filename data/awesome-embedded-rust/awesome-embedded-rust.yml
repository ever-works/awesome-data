markdown: >-
  ## Overview


  Awesome Embedded Rust is a curated list of resources for embedded and
  low-level development in the Rust programming language. The list is maintained
  by the Rust Embedded Working Group.


  ## Why Rust for Embedded?


  Rust brings memory safety and fearless concurrency to embedded systems:


  - Zero-cost abstractions

  - Memory safety without garbage collection

  - Fearless concurrency

  - Minimal runtime

  - Efficient C bindings

  - Cross-compilation support


  ## Categories


  ### Hardware Abstraction Layers (HALs)

  - Platform-specific HAL implementations

  - Peripheral access crates

  - Board support packages


  ### Real-Time Operating Systems

  - RTIC (Real-Time Interrupt-driven Concurrency)

  - FreeRTOS bindings

  - Embassy async runtime


  ### Tools and Frameworks

  - probe-rs for flashing and debugging

  - cargo-embed for development workflow

  - defmt for efficient logging

  - embedded-hal traits


  ### Device Drivers

  - Sensor drivers

  - Display drivers

  - Communication protocol implementations


  ## Supported Platforms


  - ARM Cortex-M (STM32, nRF, RP2040, ESP32-C3)

  - RISC-V

  - AVR

  - MSP430

  - Xtensa (ESP32)


  ## Community


  The Rust Embedded Working Group coordinates work on embedded systems, provides
  resources for embedded Rust development, and maintains the embedded-hal
  ecosystem. Active community with regular meetings and Matrix/Discord channels.

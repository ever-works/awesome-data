markdown: >-
  ## Overview


  Awesome Space is a comprehensive collection of space-related programming
  resources, APIs, datasets, and tools maintained by The Orbital Index
  newsletter, covering everything from satellite tracking to orbital mechanics
  simulations.


  ## Key Categories


  - **Satellite Tracking** - Real-time satellite position tracking

  - **Orbital Mechanics** - Libraries for orbital calculations

  - **Space APIs** - Launch schedules, satellite data, astronomy APIs

  - **Visualization** - 3D space and orbital visualization tools

  - **Mission Data** - Historical and current space mission information

  - **Spacecraft Software** - Open-source flight software

  - **Space Weather** - Solar activity and geomagnetic data


  ## Featured Tools & Libraries


  ### Orbital Mechanics

  - **Skyfield** - Python library for astronomical positions

  - **Poliastro** - Python library for orbital mechanics

  - **Orekit** - Java library for space dynamics

  - **GMAT** - General Mission Analysis Tool by NASA


  ### Satellite Tracking

  - **Satellite.js** - JavaScript library for satellite position calculations

  - **PyEphem** - Scientific-grade astronomical computations

  - **CelesTrak** - TLE (Two-Line Element) data source


  ### Visualization

  - **Cesium** - 3D globe and map visualization

  - **Gaia Sky** - Real-time 3D astronomy visualization

  - **Eyes on the Solar System** - NASA's interactive solar system


  ## Space Data APIs


  ### Launch Information

  - **Launch Library 2** - Rocket launch and event database

  - **SpaceX API** - SpaceX launches, rockets, and capsules

  - **NASA API** - Multiple space-related data endpoints


  ### Satellite Data

  - **N2YO** - Satellite tracking API

  - **Space-Track.org** - Satellite catalog from US Space Force

  - **Satnogs** - Open-source satellite ground station network


  ### Astronomy Data

  - **NASA Astronomy Picture of the Day (APOD)**

  - **JPL Horizons** - Ephemeris data for solar system bodies

  - **Minor Planet Center API** - Asteroid and comet data


  ## Open-Source Spacecraft Software


  - **Core Flight System (cFS)** - NASA's flight software architecture

  - **F Prime** - JPL's flight software framework

  - **KubOS** - Open-source satellite flight software


  ## Educational Resources


  - Orbital mechanics tutorials

  - Spacecraft design fundamentals

  - Mission planning guides

  - Space systems engineering


  ## Community


  Maintained by The Orbital Index, a newsletter about space and the space
  industry.


  ## Pricing


  Free and open source (GitHub repository)

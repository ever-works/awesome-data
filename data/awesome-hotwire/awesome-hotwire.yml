name: Awesome Hotwire
description: A curated list of resources, tools, tutorials, and examples for
  Hotwire (HTML Over The Wire), the alternative approach to building modern web
  applications that sends HTML instead of JSON over the wire, consisting of
  Turbo, Stimulus, and Strada frameworks.

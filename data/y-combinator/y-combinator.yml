markdown: >-
  ## Overview


  Y Combinator is the world's most prestigious startup accelerator, having
  funded and supported thousands of successful companies since 2005.


  ## Key Features


  - $500k investment standard

  - 3-month program

  - Silicon Valley network

  - Expert mentorship

  - Demo Day exposure

  - YC community for life


  ## Notable Alumni


  - Airbnb

  - Stripe

  - Dropbox

  - Reddit

  - DoorDash

  - Coinbase

  - Instacart


  ## Program Benefits


  - Funding

  - Mentorship

  - Network access

  - Office hours

  - Launch support

  - Investor introductions


  ## Application Process


  - Highly competitive

  - Online application

  - Video interviews

  - Batch acceptance

  - Twice yearly


  ## Launch HN


  YC companies get dedicated "Launch HN" posts on Hacker News for product
  launches.


  ## Target Audience


  Ambitious startup founders building high-growth technology companies.


  ## Pricing


  $500k for 7% equity (2026 standard deal).

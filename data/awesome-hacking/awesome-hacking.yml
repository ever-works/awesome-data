  - Debugging techniques

  - Malware analysis


  ### Forensics

  - Digital forensics tools

  - Memory forensics

  - Network forensics

  - Mobile forensics

  - Incident response


  ### Social Engineering

  - Phishing frameworks

  - Social engineering toolkits

  - OSINT (Open Source Intelligence)

  - Information gathering



markdown: >-
  ## Overview


  Awesome Phoenix LiveView is a curated list of awesome Phoenix LiveView
  repositories, blog posts, tutorials, and other resources. Phoenix LiveView
  enables rich, real-time user experiences with server-rendered HTML.


  ## What is Phoenix LiveView?


  Phoenix LiveView is a library for Phoenix that enables developers to build
  interactive, real-time web applications without writing JavaScript. It
  provides:


  - Server-rendered HTML with real-time updates

  - WebSocket-based communication

  - Automatic state management

  - Form handling and validation

  - File uploads

  - Testing utilities


  ## Key Features


  - **No JavaScript Required** - Build rich, interactive interfaces using only
  Elixir

  - **Real-time by Default** - Updates pushed automatically via WebSockets

  - **SEO Friendly** - Server-rendered HTML is immediately available

  - **Productive** - Leverage Elixir's productivity and Phoenix's conventions

  - **Scalable** - Built on the battle-tested BEAM VM


  ## Popular Use Cases


  - Dashboard and admin panels

  - Real-time collaboration tools

  - Live data visualizations

  - Interactive forms with instant validation

  - Chat applications

  - Gaming interfaces


  ## Learning Resources


  The awesome list includes:

  - Complete beginners step-by-step tutorials

  - Example applications and demos

  - Blog posts about best practices

  - Video tutorials and courses

  - Open-source projects using LiveView


  ## Recent Updates


  As of 2026, the Phoenix LiveView ecosystem continues to grow with projects
  including error monitoring solutions, end-to-end reactivity with Vue, and
  various production applications.

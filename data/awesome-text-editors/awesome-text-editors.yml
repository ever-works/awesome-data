markdown: >-
  ## Overview


  A comprehensive curated list of text editors spanning different platforms,
  paradigms, and use cases, from lightweight terminal editors to full-featured
  IDEs.


  ## Terminal-Based Editors


  ### Vim Family


  - **Vim** - Vi IMproved, highly configurable text editor for efficient text
  editing

  - **Neovim** - Modern fork of Vim with improved architecture, async support,
  and Lua configuration

  - **Helix** - Post-modern text editor with tree-sitter integration and LSP
  support


  ### Other Terminal Editors


  - **Emacs** - Extensible, customizable text editor with Lisp-based
  configuration

  - **Nano** - Simple, easy-to-use editor for beginners

  - **Micro** - Modern terminal text editor with mouse support

  - **Kakoune** - Modal editor with multiple selections


  ## GUI Editors


  ### Modern Code Editors


  - **Visual Studio Code** - Electron-based editor with extensive extension
  ecosystem

  - **Sublime Text** - Fast, proprietary text editor with Python API

  - **Atom** - Hackable text editor (now archived)

  - **Zed** - High-performance collaborative code editor

  - **Lapce** - Lightning-fast code editor written in Rust


  ### IDEs


  - **IntelliJ IDEA** - Java IDE with intelligent code assistance

  - **PyCharm** - Python-focused IDE

  - **WebStorm** - JavaScript/TypeScript IDE

  - **RustRover** - Rust IDE


  ## Lightweight Editors


  - **Notepad++** - Windows-only lightweight editor

  - **gedit** - GNOME text editor

  - **Kate** - KDE advanced text editor

  - **TextEdit** - macOS default editor


  ## Specialized Editors


  ### Markdown Editors


  - Typora - Seamless Markdown editing

  - Mark Text - Simple and elegant

  - Obsidian - Knowledge base with Markdown


  ### Note-Taking


  - Notion - All-in-one workspace

  - Evernote - Note organization

  - Joplin - Open-source note-taking


  ## Modern Features (2026)


  ### AI Integration


  - GitHub Copilot support

  - AI-powered code completion

  - Natural language to code

  - Automated refactoring


  ### Collaboration


  - Real-time collaborative editing

  - Live Share capabilities

  - Code review integration

  - Remote development


  ### LSP Support


  - Language Server Protocol integration

  - Intelligent code completion

  - Real-time error checking

  - Refactoring support


  ## Key Considerations


  - Performance and resource usage

  - Extension ecosystem

  - Customization capabilities

  - Language support

  - Platform availability

  - Learning curve


  ## Neovim Highlights (2026)


  In 2026, the Neovim Lua plugin ecosystem has matured significantly with
  plugins like nvim-lspconfig, nvim-cmp, Telescope, and lazy.nvim providing
  superior functionality compared to Vim.


  ## Pricing


  Ranges from free open-source (Vim, Neovim, VSCode) to paid commercial (Sublime
  Text, IntelliJ Ultimate).

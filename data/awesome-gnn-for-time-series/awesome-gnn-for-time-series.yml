markdown: >-
  ## Overview


  Awesome GNN for Time Series (GNN4TS) focuses on applying graph neural networks
  to time series problems, particularly spatial-temporal forecasting and
  analysis.


  ## Spatial-Temporal Data


  Many real-world systems have both spatial and temporal dimensions:

  - Traffic networks

  - Sensor networks

  - Climate data

  - Social networks

  - Financial markets


  ## Key Applications


  ### Traffic Forecasting

  Predicting traffic flow, speed, or demand across road networks using graph
  structures.


  ### Weather Prediction

  Modeling relationships between weather stations and atmospheric dynamics.


  ### Energy Systems

  Forecasting power consumption and generation across grids.


  ### Epidemic Modeling

  Predicting disease spread across geographical regions.


  ## Model Architectures


  - Spatio-temporal graph convolution

  - Temporal graph networks

  - Attention-based methods

  - Recurrent GNN variants


  ## Datasets


  Common benchmarks:

  - METR-LA, PEMS-BAY (traffic)

  - NYC Taxi/Bike

  - COVID-19 spread

  - Climate data

markdown: >-
  ## Overview


  Awesome Solidity is a comprehensive curated list of resources for Solidity
  smart contract development on Ethereum and EVM-compatible blockchains.


  ## Features


  - **Learning Resources**: Tutorials, documentation, and educational materials
  for learning Solidity

  - **Development Tools**: Frameworks like Hardhat and Truffle, testing tools,
  and IDEs

  - **Security Resources**: Smart contract auditing checklists and best
  practices

  - **Libraries**: Reusable contract libraries including OpenZeppelin

  - **Job Boards**: Resources for finding blockchain development opportunities

  - **Community**: Links to forums, Discord servers, and developer communities


  ## Categories Covered


  - Tutorials and documentation

  - Development frameworks and tooling

  - Security and auditing resources

  - Testing utilities

  - Libraries and standards (ERC-20, ERC-721, etc.)

  - Career resources


  ## Pricing


  Free and open-source resource collection on GitHub.

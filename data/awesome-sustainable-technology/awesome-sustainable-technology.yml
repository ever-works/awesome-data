markdown: >-
  ## Overview


  Awesome Sustainable Technology curates open-source projects and resources
  focused on preserving global energy supply and protecting vital natural
  resources through technology and innovation.


  ## Energy Management


  ### Renewable Energy Systems

  - Solar power optimization tools

  - Wind energy forecasting systems

  - Hydroelectric management platforms

  - Energy storage solutions

  - Grid integration technologies


  ### Energy Efficiency

  - Building energy management systems

  - Smart grid technologies

  - Energy consumption monitoring

  - Load balancing and optimization

  - Demand response platforms


  ## Carbon and Emissions


  ### Carbon Tracking

  - **CarbonRunner**: Platform for shifting compute workloads to lowest-carbon

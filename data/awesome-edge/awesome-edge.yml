markdown: >-
  ## Overview


  Production-ready frameworks and services focused on Edge Computing and IoT,
  enabling low-latency processing at the network edge.


  ## Edge Platforms


  - Cloudflare Workers

  - AWS Lambda@Edge

  - Vercel Edge Functions

  - Fastly Compute@Edge


  ## Features


  - Low latency processing

  - Geo-distribution

  - Edge caching

  - Serverless execution


  ## Use Cases


  - Content personalization

  - A/B testing

  - Bot detection

  - Authentication

  - Image optimization


  ## Pricing


  Mostly freemium with usage-based pricing.

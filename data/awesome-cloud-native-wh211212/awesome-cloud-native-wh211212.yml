markdown: >-
  ## Overview


  Awesome Cloud Native is an extensive collection inspired by the CNCF
  landscape, featuring the best cloud-native tools and applications.


  ## Features


  - **CNCF Projects**: Graduated, incubating, and sandbox projects

  - **Serverless Platforms**: Knative, OpenFaaS, Fission, Kubeless

  - **Cloud Providers**: AWS, GCP, Azure cloud-native services

  - **Container Tools**: Docker alternatives and complementary tools

  - **Orchestration**: Kubernetes distributions and management tools

  - **Service Mesh**: Istio, Linkerd, Consul mesh solutions

  - **Observability**: Monitoring, logging, and tracing stacks

  - **CI/CD**: Cloud-native continuous delivery platforms


  ## Categories


  - Container runtimes and images

  - Orchestration and scheduling

  - Service discovery and mesh

  - Networking and load balancing

  - Storage and databases

  - Security and policy

  - Monitoring and observability

  - CI/CD and GitOps

  - Serverless computing

  - Application definition


  ## CNCF Landscape


  - Cloud-native trail map

  - Project maturity levels

  - Vendor-neutral tools

  - Open-source focus

  - Community-driven


  ## Technologies


  - Kubernetes ecosystem

  - Cloud provider integrations

  - Multi-cloud tools

  - Edge computing platforms

  - Service mesh architectures


  ## Use Cases


  - Modernizing applications

  - Cloud migration

  - Microservices architecture

  - Container orchestration

  - DevOps automation

  - Multi-cloud strategies


  ## Pricing


  Free and open-source repository on GitHub.

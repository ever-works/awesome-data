markdown: >-
  ## Overview


  Best of Crypto is a comprehensive, automatically updated collection of the
  best open-source cryptocurrency and blockchain projects, ranked by quality
  metrics.


  ## Features


  - **3,100+ Projects**: Massive collection of crypto projects

  - **1.2M Total Stars**: Aggregate GitHub stars across all projects

  - **11 Categories**: Well-organized project classification

  - **Quality Scoring**: Automated project quality assessment

  - **Weekly Updates**: Regular updates with new projects and metrics

  - **GitHub Metrics**: Automatic collection of stars, forks, contributors

  - **Package Manager Data**: Integration with npm, PyPI, etc.

  - **Trending Projects**: Discover newly popular projects


  ## Categories Covered


  - Web3 and blockchain platforms

  - DeFi protocols and tools

  - Smart contract frameworks

  - Wallets and key management

  - Development tools and SDKs

  - Node implementations

  - Analytics and explorers

  - Security and auditing tools

  - Testing frameworks

  - Documentation and education

  - Infrastructure and DevOps


  ## Quality Metrics


  - GitHub stars and activity

  - Number of contributors

  - Release frequency

  - Documentation quality

  - Community engagement

  - Package downloads


  ## Technologies


  - Ethereum and EVM chains

  - Bitcoin and forks

  - Layer 2 solutions

  - Alternative blockchains

  - Cross-chain protocols


  ## Use Cases


  - Discovering quality crypto projects

  - Evaluating open-source options

  - Finding development tools

  - Research and comparison

  - Trend analysis

  - Portfolio of libraries


  ## Pricing


  Free and open-source repository on GitHub.

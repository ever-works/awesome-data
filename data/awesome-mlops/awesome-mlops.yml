markdown: >-
  ## Overview


  Awesome MLOps provides curated references and resources for Machine Learning
  Operations, standing at the intersection of machine learning, DevOps, and data
  engineering.


  ## Features


  - **Comprehensive Tooling**: AutoML tools, CI/CD for ML, data cataloging,
  experiment tracking, feature stores, model serving

  - **Platform Coverage**: Open source and commercial MLOps platforms

  - **Educational Resources**: Books, papers, newsletters, courses, and
  tutorials

  - **Best Practices**: Industry-proven patterns for ML lifecycle management

  - **Community Insights**: Real-world implementations and case studies

  - **Framework Agnostic**: Tools for TensorFlow, PyTorch, scikit-learn, and
  more


  ## Categories


  - Model training and experimentation

  - Model deployment and serving

  - Model monitoring and observability

  - Data versioning and lineage

  - Feature engineering and stores

  - ML pipeline orchestration

  - Automated ML (AutoML)

  - Model governance and compliance


  ## Use Cases


  - Productionizing machine learning models

  - Implementing CI/CD for ML pipelines

  - Managing ML lifecycle at scale

  - Monitoring model performance and drift


  ## Pricing


  Free and open-source resource list. Tools listed have varied pricing.

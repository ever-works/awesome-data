markdown: >-
  ## Overview


  Hiring Without Whiteboards lists companies that don't use traditional
  "whiteboard" interviews (metaphor for CS trivia questions) and instead use
  techniques resembling day-to-day work.


  ## Features


  - **Alternative Interview Formats**: Take-home projects, pair programming,
  code reviews, portfolio reviews

  - **Real-World Focus**: Interview questions and tasks that mirror actual job
  responsibilities

  - **Company Directory**: Comprehensive list of companies with better hiring
  practices

  - **Community-Maintained**: Open contributions and regular updates

  - **Global Coverage**: Companies from various countries and regions

  - **Remote-Friendly**: Many listed companies offer remote positions


  ## Interview Approaches


  - **Take-Home Exercises**: Paid or unpaid coding projects with discussion

  - **Pair Programming**: Collaborative problem-solving sessions

  - **Code Review**: Discussion of past work and contributions

  - **Real Problems**: Working on actual business challenges

  - **Portfolio Evaluation**: Assessment of previous projects and experience


  ## Related Projects


  - Remote jobs intersection list for companies offering both remote work and
  humane interviews

  - Regional variations (e.g., India-specific version)


  ## Pricing


  Free and open-source resource list.

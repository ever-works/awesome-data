markdown: >-
  ## Overview


  Awesome AI Agents 2026 is the most comprehensive curated list of AI agents,
  frameworks, and tools specifically updated for 2026. This repository serves as
  a central resource for developers and researchers working with autonomous AI
  systems.


  ## Features


  - **300+ Resources**: Curated collection of AI agent tools, frameworks, and
  platforms

  - **20+ Categories**: Organized sections covering coding tools, voice agents,
  multimodal systems, security tools, and more

  - **Monthly Updates**: Regularly updated to include the latest AI agent
  developments

  - **Coding Tools**: AI-powered development assistants and code generation
  tools

  - **Voice Agents**: Speech recognition and voice-based AI interaction systems

  - **Multimodal Systems**: Agents that process multiple data types (text,
  image, audio, video)

  - **Security Tools**: AI agents focused on cybersecurity and threat detection

  - **Community-Driven**: Open for contributions from the AI research and
  development community


  ## Categories Covered


  - Agent Frameworks

  - LLM Integration

  - Autonomous Agents

  - Multi-Agent Systems

  - Agent Orchestration

  - Memory Systems

  - Tool Integration

  - Evaluation Frameworks


  ## Pricing


  Free and open-source resource.

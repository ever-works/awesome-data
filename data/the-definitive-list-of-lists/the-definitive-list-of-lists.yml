markdown: >-
  ## Overview


  A meta-collection of curated lists on GitHub and beyond. Contains useful,
  silly, and awesome lists across every imaginable topic.


  ## What's Inside


  ### Awesome Lists


  - sindresorhus/awesome - The original awesome list

  - Thousands of topic-specific awesome lists

  - Language-specific collections

  - Framework and tool lists


  ### Other List Types


  - Reading lists

  - Learning resources

  - Tool collections

  - Best practice guides

  - Community resources


  ## List Categories


  - Programming languages

  - Frameworks and libraries

  - Development tools

  - Design resources

  - Business and marketing

  - Science and research

  - Entertainment and hobbies


  ## Quality Criteria


  - Well-maintained

  - Actively updated

  - Community endorsed

  - Comprehensive coverage

  - Clear organization


  ## Finding Lists


  - By topic or domain

  - By programming language

  - By industry

  - By use case

  - By popularity


  ## Contributing


  Community-driven with contributions welcome for new lists and updates to
  existing ones.


  ## Pricing


  Free and open-source directory.

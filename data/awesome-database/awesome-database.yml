markdown: >-
  ## Overview


  Comprehensive collection of database systems, libraries, and resources across
  all database paradigms.


  ## SQL Databases


  - PostgreSQL

  - MySQL/MariaDB

  - SQLite

  - Oracle

  - SQL Server


  ## NoSQL Databases


  - MongoDB - Document store

  - Redis - Key-value store

  - Cassandra - Wide column store

  - Neo4j - Graph database


  ## NewSQL


  - CockroachDB

  - TiDB

  - YugabyteDB

  - VoltDB


  ## Specialized


  - InfluxDB - Time series

  - Elasticsearch - Search engine

  - Dgraph - Graph database


  ## Pricing


  Mostly open-source with commercial options.

markdown: >-
  ## Overview


  Awesome Database is a curated list of database libraries and resources
  covering database systems, tools, and concepts.


  ## Database Systems


  ### Relational

  - PostgreSQL

  - MySQL/MariaDB

  - Oracle

  - Microsoft SQL Server

  - SQLite


  ### NoSQL Document

  - MongoDB

  - CouchDB

  - RavenDB

  - Firebase Firestore


  ### Key-Value

  - Redis

  - DynamoDB

  - etcd

  - Riak


  ### Column-Family

  - Apache Cassandra

  - HBase

  - ScyllaDB


  ### Graph

  - Neo4j

  - ArangoDB

  - Amazon Neptune


  ### Time-Series

  - InfluxDB

  - TimescaleDB

  - Prometheus


  ### NewSQL

  - CockroachDB

  - TiDB

  - VoltDB


  ## Database Tools


  ### Design & Modeling

  - ER/Studio

  - MySQL Workbench

  - pgModeler

  - dbdiagram.io


  ### Administration

  - DBeaver

  - Adminer

  - phpMyAdmin

  - pgAdmin


  ### Query Tools

  - DataGrip

  - SQL Developer

  - Azure Data Studio


  ### Benchmarking

  - sysbench

  - pgbench

  - HammerDB


  ## Database Concepts


  ### Normalization

  - First Normal Form (1NF)

  - Second Normal Form (2NF)

  - Third Normal Form (3NF)

  - Boyce-Codd Normal Form (BCNF)


  ### Transactions

  - ACID properties

  - Isolation levels

  - Concurrency control

  - Locking mechanisms


  ### Query Optimization

  - Query execution plans

  - Index selection

  - Join algorithms

  - Statistics and cardinality


  ## Learning Resources


  - Database textbooks

  - Online courses

  - Tutorials and guides

  - Best practices documentation

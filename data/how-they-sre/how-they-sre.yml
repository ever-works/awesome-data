markdown: >-
  ## Overview


  How They SRE is a curated knowledge repository of Site Reliability Engineering
  best practices, tools, techniques, and culture adopted by leading technology
  organizations.


  ## Company Practices


  ### Tech Giants

  - Google - Origin of SRE practices

  - Netflix - Chaos engineering pioneers

  - Amazon - Two-pizza team model

  - Microsoft - Azure SRE practices


  ### Key Areas Covered


  #### Incident Management

  - On-call rotations

  - Incident response procedures

  - Post-mortem processes

  - Blameless culture


  #### Monitoring & Observability

  - Metrics collection

  - Distributed tracing

  - Log aggregation

  - Alert fatigue management


  #### Automation

  - Infrastructure as Code

  - Auto-remediation

  - Deployment automation

  - Capacity planning


  #### Service Level Objectives

  - SLI definition

  - SLO setting

  - Error budgets

  - SLA management


  ## SRE Tools & Practices


  - Prometheus for monitoring

  - Kubernetes for orchestration

  - Terraform for IaC

  - GitOps workflows

  - Chaos engineering tools


  ## Team Structure


  - SRE team models

  - Developer/SRE collaboration

  - Skills and competencies

  - Career paths


  ## Culture & Process


  - Blameless post-mortems

  - Learning from failures

  - Operational excellence

  - Toil reduction

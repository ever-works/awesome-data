markdown: >-
  ## Overview


  A comprehensive list of deep learning implementations in biology, featuring
  research papers, tools, and applications across genomics, proteomics, drug
  discovery, and medical imaging.


  ## Research Directions


  ### Genomics and Gene Expression


  - Gene expression prediction

  - Regulatory element identification

  - Variant effect prediction

  - Splicing prediction

  - Chromatin accessibility analysis


  ### Protein Structure and Function


  - Protein folding prediction (AlphaFold-style approaches)

  - Secondary structure prediction

  - Protein-protein interactions

  - Binding site prediction

  - Function annotation


  ### Drug Discovery


  - Molecule generation and optimization

  - Drug-target interaction prediction

  - Toxicity prediction

  - ADMET properties prediction

  - Virtual screening


  ### Medical Imaging


  - Disease diagnosis from images

  - Tumor segmentation

  - Cell classification

  - Pathology analysis

  - Medical image enhancement


  ### Single Cell Analysis


  - Cell type classification

  - Trajectory inference

  - Spatial transcriptomics

  - Multi-omics integration


  ## Data Types


  - DNA/RNA sequences

  - Protein sequences and structures

  - Chemical structures

  - Medical images (CT, MRI, X-ray)

  - Microscopy images


  ## Deep Learning Models Used


  - Convolutional Neural Networks (CNNs)

  - Recurrent Neural Networks (RNNs/LSTMs)

  - Transformers (BERT, GPT variants)

  - Graph Neural Networks (GNNs)

  - Variational Autoencoders (VAEs)

  - Generative Adversarial Networks (GANs)


  ## Notable Tools


  - DeepChem - Deep learning for chemistry and drug discovery

  - AlphaFold - Protein structure prediction

  - DeepVariant - Genomic variant calling

  - PathAI - AI for pathology


  ## Applications


  - Precision medicine

  - Drug development

  - Disease diagnosis

  - Genetic counseling

  - Agricultural genomics


  ## Pricing


  Mostly free and open-source research tools.

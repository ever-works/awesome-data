markdown: >-
  ## Overview


  Awesome CSS Resources provides a comprehensive collection of CSS/SCSS
  frameworks, tools, and learning materials.


  ## Featured Tools


  - **Primer CSS** - GitHub's front-end design CSS toolkit

  - **Glassmorphism CSS Generator** - Create modern glassmorphic designs

  - **GradientArt** - Advanced CSS gradient editor with layering and design
  tools


  ## CSS Frameworks


  - Pure.css - Small, responsive CSS modules

  - Tailwind CSS - Utility-first CSS framework

  - Bootstrap - Popular responsive framework

  - Bulma - Modern CSS framework

  - Foundation - Responsive front-end framework


  ## Tools & Generators


  - CSS Grid generators

  - Flexbox tools

  - Color palette generators

  - Shadow generators

  - Animation builders

  - Gradient creators


  ## Learning Resources


  - CSS tutorials and courses

  - Design patterns

  - Best practices

  - Browser compatibility guides

  - Performance optimization


  ## Use Cases


  - Modern web design

  - Rapid prototyping

  - Component libraries

  - Design systems

  - Learning CSS


  ## Pricing


  Free and open-source resources.

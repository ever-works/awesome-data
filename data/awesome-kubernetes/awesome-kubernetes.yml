name: Awesome Kubernetes
description: A curated list for awesome Kubernetes projects and tools including
  monitoring solutions like Prometheus and Grafana, GitOps tools like ArgoCD,
  and service meshes like Linkerd and Istio.
source_url: https://github.com/run-x/awesome-kubernetes
category: Cloud & Infrastructure

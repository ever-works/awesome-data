markdown: >-
  ## Overview


  Awesome JS Runtimes is a curated list of JavaScript/ECMAScript runtimes, app
  frameworks, and engines, showcasing alternatives and complements to Node.js.


  ## Modern JavaScript Runtimes


  ### Deno

  - Simple, modern and secure runtime for JavaScript and TypeScript

  - Uses V8 and is built in Rust

  - Built-in TypeScript support

  - Secure by default (explicit permissions)

  - Modern standard library


  ### Bun

  - Fast all-in-one JavaScript runtime

  - Includes bundler, test runner, and package manager

  - Drop-in replacement for Node.js

  - JavaScriptCore-based


  ### workerd

  - JavaScript/Wasm server runtime by Cloudflare

  - Powers Cloudflare Workers

  - Based on V8

  - Optimized for edge computing


  ## Specialized Runtimes


  - **Elsa** - Minimal JavaScript and TypeScript runtime written in Go, built on
  quickjs

  - **Dune** - Open-source, cross-platform shell around V8 engine, written in
  Rust

  - **Sable** - Web-standards focused runtime with built-in tooling

  - **Boa** - Embeddable JavaScript engine written in Rust


  ## Use Cases


  - Server-side applications

  - Edge computing and serverless functions

  - Desktop applications

  - Embedded systems

  - CLI tools

  - Browser automation


  ## Key Features to Consider


  - Performance characteristics

  - Standard library offerings

  - Package ecosystem compatibility

  - Security model

  - Deployment targets

  - Tooling integration

markdown: >-
  ## Overview


  A comprehensive curated list of 3D graphics libraries and resources, featuring
  modern cross-platform graphics libraries, rendering engines, and visualization
  frameworks.


  ## Modern Graphics Engines


  ### High-Level Engines


  - **Diligent Engine** - Modern cross-platform graphics API abstraction

  - **Filament** - Real-time physically based rendering engine for Android, iOS,
  Windows, Linux, macOS, and WebGL2

  - **Magnum** - Lightweight graphics middleware for games and data
  visualization

  - **The Forge** - Cross-platform rendering framework


  ### Specialized Libraries


  - **Easy3D** - Lightweight library for processing and rendering 3D data

  - **Falcor** - Real-time rendering framework for rapid prototyping

  - **Irrlicht** - Open source high performance realtime 3D engine


  ## Graphics APIs


  ### Low-Level APIs


  - Vulkan - Modern explicit graphics and compute API

  - DirectX 12 - Microsoft's graphics API

  - Metal - Apple's graphics framework

  - OpenGL - Cross-platform graphics API


  ### Abstraction Layers


  - bgfx - Cross-platform rendering library

  - sokol - Minimal cross-platform libraries

  - wgpu - Rust implementation of WebGPU


  ## Features


  - Physically based rendering (PBR)

  - Ray tracing capabilities

  - Compute shader support

  - Multi-platform support

  - VR/AR rendering

  - Material systems


  ## Use Cases


  - Game development

  - Scientific visualization

  - CAD/CAM applications

  - Virtual reality experiences

  - Real-time simulations

  - Data visualization


  ## Platform Support


  Most libraries support Windows, Linux, macOS, with many also supporting mobile
  (iOS/Android) and web (WebGL/WebGPU).


  ## Pricing


  Mostly free and open-source libraries.

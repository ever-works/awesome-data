markdown: >-
  ## Overview


  Awesome GitHub Badges provides a curated collection of badges for GitHub
  repositories using shields.io and other badge services.


  ## Features


  - CI/CD status badges

  - Version badges

  - Download count badges

  - License badges

  - Code coverage badges

  - Social badges

  - Custom badges


  ## Badge Services


  - Shields.io

  - badgen.net

  - forthebadge.com


  ## Pricing


  Free resource.

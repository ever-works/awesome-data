markdown: >-
  ## Overview


  Awesome LeetCode Resources provides curated materials for mastering Data
  Structures and Algorithms (DSA) through LeetCode practice, with a focus on
  coding interview preparation.


  ## Resource Categories


  ### Problem Patterns


  - Two Pointers

  - Sliding Window

  - Binary Search

  - Depth-First Search (DFS) and Breadth-First Search (BFS)

  - Dynamic Programming (DP)

  - Backtracking

  - Greedy Algorithms

  - Divide and Conquer

  - Graph Algorithms

  - Tree Traversals


  ### Study Plans


  - Blind 75: The most popular curated list of 75 LeetCode problems

  - Grind 75: Extended version with 75-169 problems organized by week

  - NeetCode 150: Comprehensive problem list with video explanations

  - LeetCode Top Interview Questions

  - Company-specific problem lists (FAANG/MAANG)


  ### Learning Resources


  - **Video Explanations**: Links to YouTube channels with detailed problem
  walkthroughs

  - **Written Editorials**: Blog posts and articles explaining solution
  approaches

  - **Pattern Recognition**: Guides to identifying problem types

  - **Time Complexity Analysis**: Understanding Big O notation and optimization

  - **Interview Strategies**: Tips for communicating solutions during interviews


  ## Company-Specific Preparation


  - Google interview questions

  - Amazon (OA and on-site)

  - Meta/Facebook coding interviews

  - Microsoft assessment patterns

  - Apple technical screens


  ## Features


  - Organized by difficulty and topic

  - Multiple solution approaches for each problem

  - Links to high-quality explanations

  - Time and space complexity analysis

  - Interview tips and strategies

  - Study schedules and roadmaps


  ## Pricing


  Free and open-source. LeetCode platform has both free and premium tiers.

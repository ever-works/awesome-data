markdown: >-
  ## Overview


  The Remote Freelancer is a community-curated resource for finding remote
  freelance and contract work opportunities, inspired by developer experiences
  and focused on reliable platforms for software developers, designers, and
  digital professionals.


  ## Key Categories


  - **Freelance Platforms** - Marketplaces for finding clients

  - **Contract Work** - Long-term contract opportunities

  - **Specialized Platforms** - Niche-specific job boards

  - **Payment Solutions** - International payment processors

  - **Business Tools** - Invoicing, contracts, accounting

  - **Communities** - Networking and support groups


  ## Major Freelance Platforms


  ### General Platforms

  - **Upwork** - Large freelance marketplace

  - **Freelancer.com** - Global freelancing platform

  - **Fiverr** - Gig-based freelance services

  - **PeoplePerHour** - Freelance services marketplace

  - **Guru** - Professional freelance platform


  ### Tech-Focused Platforms

  - **Toptal** - Elite freelance talent network (highly selective)

  - **Gun.io** - Vetted freelance developers

  - **Gigster** - High-quality software freelancers

  - **CodementorX** - Expert freelance developers

  - **Working Nomads** - Remote tech jobs


  ### Design & Creative

  - **99designs** - Graphic design contests and freelance

  - **Dribbble Jobs** - Design opportunities

  - **Behance** - Creative professional network

  - **Coroflot** - Design jobs board


  ## Contract Work Opportunities


  ### Long-term Contracts

  - Remote contract developer positions

  - Part-time consulting arrangements

  - Project-based engagements

  - Retainer agreements


  ### Direct Client Platforms

  - **Hubstaff Talent** - Free resource for finding remote talent

  - **We Work Remotely** - Remote job listings

  - **Remotive** - Remote job board


  ## Payment & Financial Tools


  ### Payment Processors

  - **PayPal** - Global payment solution

  - **TransferWise (Wise)** - International transfers

  - **Payoneer** - Cross-border payments

  - **Stripe** - Online payment processing


  ### Invoicing & Accounting

  - **FreshBooks** - Cloud accounting software

  - **Wave** - Free accounting and invoicing

  - **QuickBooks Self-Employed** - Freelancer accounting

  - **Zoho Invoice** - Free invoicing software


  ## Business Management


  ### Contracts & Legal

  - Contract templates for freelancers

  - Terms of service generators

  - NDA templates

  - SOW (Statement of Work) samples


  ### Time Tracking & Productivity

  - **Harvest** - Time tracking and invoicing

  - **Toggl** - Simple time tracking

  - **Clockify** - Free time tracking


  ### Project Management

  - **Trello** - Visual task management

  - **Asana** - Work tracking platform

  - **Notion** - All-in-one workspace


  ## Freelance Communities


  - **Indie Hackers** - Community of indie makers

  - **Freelance subreddit** - Reddit community

  - **Nomad List** - Digital nomad community

  - **Slack communities** - Various freelance Slack groups


  ## Resources for Success


  ### Skills Development

  - Portfolio building

  - Client communication

  - Rate negotiation

  - Proposal writing


  ### Business Growth

  - Finding your niche

  - Marketing your services

  - Building long-term client relationships

  - Scaling your freelance business


  ## Origin


  Inspired by Hacker News discussions about Upwork experiences and the need for
  additional freelance resources for developers seeking nomadic and remote work.


  ## Pricing


  Free and open source (GitHub repository)

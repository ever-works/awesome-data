markdown: >-
  ## Overview


  Awesome Unified Multimodal Models provides a comprehensive survey of unified
  models that handle multiple modalities within a single architecture. Unlike
  specialized multimodal models, unified models can process and generate across
  vision, language, audio, and other modalities using shared architectures and
  training objectives.


  ## Features


  - **Comprehensive Survey**: Complete overview of unified multimodal
  architectures

  - **Categorized Architectures**: Diffusion-based, autoregressive, and hybrid
  models

  - **Timeline View**: Models organized by release year (2023-2025)

  - **Public and Private Models**: Coverage of both available and unavailable
  models

  - **Capability Matrix**: Detailed comparison of modality support

  - **Training Approaches**: Various training paradigms and objectives

  - **Research Papers**: Links to original publications


  ## Architecture Categories


  ### Diffusion-Based Models

  - **Chameleon**: Meta's unified vision-language model

  - **EMU**: Generative multimodal models

  - **Unified-IO 2**: Unified input-output model

  - **Show-o**: Image and text generation


  ### Autoregressive MLLMs

  - **GPT-4**: Next-token prediction across modalities

  - **Gemini**: Native multimodal autoregressive

  - **LWM (Large World Model)**: Long-context multimodal

  - **Transfusion**: Mixed diffusion-autoregressive


  ### Hybrid Approaches

  - **CoDi**: Combining diffusion and autoregressive

  - **Unified-IO**: Mixture of objectives

  - **NExT-GPT**: Modality-switching generation


  ## Supported Modalities


  ### Core Modalities

  - **Vision**: Images, video frames

  - **Language**: Text in multiple languages

  - **Audio**: Speech, music, environmental sounds

  - **Video**: Temporal visual sequences


  ### Emerging Modalities

  - 3D point clouds

  - Depth maps

  - Thermal imaging

  - Sensor data


  ## Model Timeline (2023-2025)


  ### 2023

  - BLIP-2, InstructBLIP

  - LLaVA, MiniGPT-4

  - Unified-IO, Unified-IO 2

  - CoDi, CoDi-2


  ### 2024

  - GPT-4V, Gemini 1.0

  - LWM, Video-LLaVA

  - Chameleon, EMU series

  - Transfusion


  ### 2025

  - Gemini 1.5, Claude 3

  - Next-generation unified models

  - Scaling to 1M+ context

  - Real-time multimodal processing


  ## Key Capabilities


  ### Understanding Tasks

  - Cross-modal retrieval

  - Multimodal question answering

  - Visual reasoning

  - Audio-visual synchronization

  - Video understanding


  ### Generation Tasks

  - Text-to-image generation

  - Image-to-text generation

  - Text-to-video

  - Audio generation

  - Cross-modal translation


  ### Unified Capabilities

  - Any-to-any generation

  - Modality mixing and blending

  - Context-aware generation

  - Long-context understanding


  ## Training Paradigms


  ### Pre-training

  - Large-scale multimodal corpora

  - Interleaved multimodal sequences

  - Self-supervised objectives

  - Contrastive learning


  ### Instruction Tuning

  - Multimodal instruction datasets

  - Task-specific fine-tuning

  - Few-shot adaptation


  ### Alignment

  - Human preference learning

  - Safety and helpfulness alignment

  - Modality-specific constraints


  ## Challenges and Future Directions


  ### Current Challenges

  - Computational efficiency at scale

  - Modality imbalance in training

  - Evaluation across diverse tasks

  - Hallucination in generation


  ### Future Research

  - Scaling to more modalities

  - Improved efficiency

  - Better understanding of unified representations

  - Real-world deployment


  ## Pricing


  Free and open-source research resource.

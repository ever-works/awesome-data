markdown: >-
  ## Overview


  Hacker News is the premier online community for startup founders, developers,
  and technology professionals, run by Y Combinator.


  ## Show HN


  - **Launch Format**: "Show HN:" prefix

  - **Product Demos**: Share what you've built

  - **Community Feedback**: Engage with commenters

  - **Viral Potential**: Front page = massive traffic

  - **Strict Guidelines**: Follow HN culture


  ## Community Culture


  - Intellectual curiosity

  - Thoughtful discussion

  - Technical depth

  - Honest feedback

  - No marketing fluff


  ## Success Factors


  - Genuinely interesting product

  - Clear problem solving

  - Technical merit

  - Timing (weekday mornings PST)

  - Community engagement


  ## Monthly Features


  - "Who is hiring?" threads

  - "Ask HN" discussions

  - "Show HN" launches

  - Tech news and essays


  ## Benefits


  - Massive traffic potential

  - Quality audience

  - Investor visibility

  - Technical feedback

  - Brand credibility


  ## Target Audience


  Tech founders, developers, and startups with genuinely innovative products for
  a sophisticated technical audience.


  ## Pricing


  Free community.

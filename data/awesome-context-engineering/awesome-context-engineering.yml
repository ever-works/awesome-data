markdown: >-
  ## Overview


  A comprehensive survey on Context Engineering: from prompt engineering to
  production-grade AI systems. This repository contains hundreds of papers,
  frameworks, and implementation guides for LLMs and AI agents.


  ## Key Concepts


  In 2026, context engineering has evolved beyond simple prompt engineering to
  encompass the entire agent harness - the runtime loop that manages:


  - Plans and subagents

  - Checkpoints and recovery from failure

  - File and tool execution

  - Approval workflows


  ## Features


  - Extensive collection of research papers on context engineering

  - Production-ready frameworks and tools

  - Implementation guides for LLM applications

  - Best practices for context window management

  - Agent system design patterns

  - Multi-agent architecture resources


  ## Target Audience


  Perfect for developers building AI agents, LLM applications, and production AI
  systems who need to optimize context management and agent orchestration.


  ## Pricing


  Free and open-source resource collection.

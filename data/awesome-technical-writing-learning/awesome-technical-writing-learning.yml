markdown: >-
  ## Overview


  Awesome Technical Writing Learning provides a curated collection of free
  resources to help aspiring and practicing technical writers improve their
  skills. This repository focuses on accessible, high-quality learning materials
  for documentation professionals.


  ## Core Resources


  ### Write the Docs Community

  The Software Documentation Guide is a living guide around best practices for
  creating software documentation, developed and maintained by the Write the
  Docs community. It covers:

  - Documentation types and when to use them

  - Writing for different audiences

  - Documentation tools and workflows

  - Style guides and best practices


  ## Learning Paths


  ### For Beginners

  - Introduction to technical writing

  - Understanding your audience

  - Basic documentation structures

  - Grammar and style fundamentals

  - Tools overview


  ### For Intermediate Writers

  - API documentation

  - User guides and tutorials

  - Information architecture

  - Content management systems

  - Collaboration workflows


  ### For Advanced Practitioners

  - Docs-as-code methodologies

  - Documentation strategy

  - Metrics and analytics

  - Localization and internationalization

  - Accessibility standards


  ## Topics Covered


  ### Writing Skills

  - Clear and concise writing

  - Active voice and sentence structure

  - Technical accuracy

  - Consistency and style

  - Editing and proofreading


  ### Documentation Types

  - README files

  - User manuals

  - API references

  - Tutorials and how-tos

  - Release notes

  - Troubleshooting guides


  ### Tools & Technologies

  - Markdown and lightweight markup

  - Static site generators (Jekyll, Hugo, Sphinx)

  - Version control (Git)

  - Documentation platforms (ReadTheDocs, GitBook)

  - Diagramming tools


  ## Best Practices


  - Writing for international audiences

  - Creating accessible documentation

  - Maintaining documentation

  - Testing documentation

  - Gathering user feedback


  ## Community Resources


  ### Write the Docs

  Global community of people who care about documentation, offering:

  - Annual conferences

  - Local meetups

  - Slack community

  - Newsletter


  ### Online Communities

  - Technical writing forums

  - Documentation discussion groups

  - Open source documentation projects


  ## Career Development


  - Portfolio building tips

  - Job search strategies

  - Interview preparation

  - Freelancing guidance

  - Continuous learning


  ## Free Courses


  Includes links to:

  - Google's Technical Writing Courses

  - OpenLearn courses

  - Coursera and edX free offerings

  - YouTube tutorial series


  ## Why Technical Writing?


  Technical writing is a crucial skill in software development and technology
  industries. Good documentation:

  - Reduces support burden

  - Improves user experience

  - Facilitates onboarding

  - Enables self-service

  - Builds trust


  ## Licensing


  All resources in this collection are freely available, promoting accessibility
  to technical writing education.

markdown: >-
  ## Overview


  Awesome Conferences is a community-curated list of technology conferences from
  around the world, featuring details about major tech events, speaker lineups,
  locations, and attendee reviews to help developers and tech professionals
  choose which conferences to attend.


  ## Key Categories


  - **Software Development** - General programming conferences

  - **Web Development** - JavaScript, HTML, CSS, frontend/backend

  - **Mobile Development** - iOS, Android, cross-platform

  - **Data Science & AI** - Machine learning, data engineering

  - **DevOps & Cloud** - Infrastructure, deployment, cloud platforms

  - **Security** - Cybersecurity and infosec conferences

  - **Design** - UX/UI, product design

  - **Industry-Specific** - Domain-focused events


  ## Major Tech Conferences


  ### General Software Development

  - **OSCON** - O'Reilly Open Source Convention

  - **Strange Loop** - Software development and the future of computing

  - **QCon** - Software development conference

  - **GOTO** - Developer conference series


  ### Web Development

  - **JSConf** - JavaScript conference series (global)

  - **React Conf** - Official React conference

  - **VueConf** - Vue.js conferences worldwide

  - **CSSConf** - CSS and web design

  - **SmashingConf** - Web design and development


  ### Mobile Development

  - **WWDC** - Apple Worldwide Developers Conference

  - **Google I/O** - Google's developer conference

  - **try! Swift** - iOS development conference

  - **Droidcon** - Android developer conferences


  ### Data Science & AI

  - **NeurIPS** - Neural Information Processing Systems

  - **ICML** - International Conference on Machine Learning

  - **Strata Data Conference** - Big data and AI

  - **PyData** - Python in data science


  ### DevOps & Cloud

  - **KubeCon** - Cloud Native Computing Foundation conference

  - **DockerCon** - Docker and containers

  - **AWS re:Invent** - Amazon Web Services annual conference

  - **HashiConf** - HashiCorp products and ecosystem


  ### Security

  - **Black Hat** - Information security conference

  - **DEF CON** - Hacker convention

  - **RSA Conference** - Cybersecurity conference

  - **BSides** - Security conferences worldwide


  ### Design

  - **UXDX** - User experience and design

  - **Adobe MAX** - Creativity conference

  - **Awwwards Conference** - Digital design


  ## Conference Information


  ### What You'll Find

  - Conference names and websites

  - Location and dates

  - Typical ticket prices

  - Call for Papers (CFP) deadlines

  - Speaker lineups and topics

  - Attendee reviews and recommendations

  - Code of conduct information


  ## Regional Conferences


  - **North America** - US and Canada tech events

  - **Europe** - Major European conferences

  - **Asia-Pacific** - APAC region events

  - **Latin America** - LatAm tech conferences

  - **Africa** - African tech events


  ## Virtual & Hybrid Events


  - Online-only conferences

  - Hybrid in-person/virtual options

  - Recorded talks and sessions

  - Virtual networking opportunities


  ## Planning Your Conference Attendance


  ### Before the Conference

  - Research speakers and session topics

  - Plan your schedule

  - Connect with attendees on social media

  - Book accommodation early


  ### At the Conference

  - Network with other attendees

  - Attend talks and workshops

  - Visit sponsor booths

  - Participate in hallway track discussions


  ### After the Conference

  - Follow up with contacts

  - Share learnings with your team

  - Access recorded sessions

  - Join conference communities


  ## Benefits of Attending


  - Learn from industry experts

  - Network with peers and potential employers

  - Discover new tools and technologies

  - Get inspired by innovative ideas

  - Build your professional brand


  ## Community Contributions


  The repository accepts community contributions including conference reviews,
  speaker recommendations, and new conference additions.


  ## Pricing


  Free and open source (GitHub repository)

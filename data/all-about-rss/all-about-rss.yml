markdown: >-
  ## Overview


  ALL about RSS is an extensive curated collection documenting RSS-related
  tools, services, communities, and educational resources, extending content
  from the Telegram channel @AboutRSS.


  ## Features


  - **Educational Content**: Multiple explanations of RSS fundamentals including
  images, videos, and webpages in English and Chinese

  - **Technical Specifications**: Comprehensive coverage of feed formats
  including RSS 0.90-2.0, Atom, JSON Feed, and emerging standards like RSS3

  - **RSS Extensions**: Documentation of Media RSS, GeoRSS, Podcast namespace,
  and other extensions

  - **Reader Applications**: Extensive catalog of RSS readers across all
  platforms (iOS, Android, Windows, Mac, Linux, web-based, terminal-based)

  - **Feed Generation**: Tools for creating RSS feeds from webpages, social
  media, newsletters, and more

  - **Advanced Functionality**: Feed customization, enhancement tools, and
  integrations with Telegram, Discord, and Mastodon

  - **Podcast Support**: Podcast-specific RSS implementations and tools

  - **Community Resources**: Discussion forums, Telegram groups, and social
  networks based on RSS


  ## Categories


  - Feed readers (hosted and self-hosted)

  - Feed generators and converters

  - Browser extensions and mobile apps

  - Podcast players and RSS implementations

  - Feed search engines and aggregators

  - Community forums and social networks

  - Educational resources and tutorials


  ## Pricing


  Free and open-source resource list.

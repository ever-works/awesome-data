markdown: >-
  ## Overview


  The IndieWeb is a people-focused alternative to the 'corporate web', focused
  on owning your domain, using it as your primary identity, publishing on your
  own site, and optionally syndicating elsewhere.


  ## Core Principles


  - Own your domain and data

  - Use your domain as your identity

  - Publish on your own site first

  - Syndicate to other platforms (POSSE)

  - Control your online presence


  ## Key Technologies


  - **Webmention** - Simple way to notify any URL when you link to it from your
  site

  - **Micropub** - Standard API for creating posts on your own domain

  - **IndieAuth** - Decentralized authentication using your domain

  - **Microformats** - Structured data markup

  - **Bridgy** - Pulls comments and likes from social networks back to your
  website


  ## Features


  - Decentralized identity systems

  - Cross-site commenting and interactions

  - Social media syndication tools

  - Self-hosted publishing platforms

  - Federation protocols

  - RSS/Atom feed tools


  ## Popular IndieWeb Tools


  - Known - Publishing platform for the IndieWeb

  - Micro.blog - Indie microblogging platform

  - WordPress IndieWeb plugins

  - Hugo/Jekyll IndieWeb themes


  ## Benefits


  - Data ownership and portability

  - Freedom from platform lock-in

  - Algorithmic timeline control

  - Permanent URLs and content

  - Privacy and independence


  ## Pricing


  Free and open-source protocols and tools.

markdown: >-
  ## Overview


  Awesome Indie Game Development collects free and affordable resources for
  independent game developers. This repository helps solo developers and small
  teams create games without breaking the bank.


  ## Game Engines


  ### Free & Open Source


  **Godot**

  - Completely free and open source

  - 2D and 3D capabilities

  - Visual scripting option

  - Small export sizes

  - Active community


  **Unity**

  - Free for revenue under $100k

  - Huge asset store

  - Cross-platform

  - Extensive tutorials


  **Unreal Engine**

  - Free with 5% royalty after $1M

  - AAA graphics capability

  - Blueprint visual scripting

  - Complete source code access


  ### 2D Focused


  **GameMaker Studio**

  - Beginner-friendly

  - Drag-and-drop or code

  - Export to multiple platforms

  - Free trial available


  **Construct**

  - No coding required

  - Browser-based

  - Event-driven logic


  **Love2D**

  - Lua-based framework

  - Lightweight

  - Completely free


  ## Art & Graphics


  ### 2D Art Tools


  **Krita**

  - Free digital painting software

  - Professional features

  - Animation support


  **Aseprite**

  - Pixel art editor ($20)

  - Animation tools

  - Export sprite sheets


  **GIMP**

  - Free Photoshop alternative

  - Comprehensive features


  ### 3D Tools


  **Blender**

  - Completely free

  - Modeling, texturing, animation

  - Game asset pipeline

  - Sculpting tools


  **Sketchfab**

  - Free 3D model hosting

  - Download free models

  - Portfolio platform


  ### Asset Resources


  **OpenGameArt.org**

  - Free game assets

  - Various licenses

  - Community contributions


  **itch.io Asset Packs**

  - Many free resources

  - Pay-what-you-want models

  - Support creators


  **Kenney.nl**

  - High-quality free assets

  - Public domain (CC0)

  - Game-ready sprites and models


  ## Audio


  ### Music Tools


  **LMMS**

  - Free music production

  - Built-in instruments

  - VST support


  **Bosca Ceoil**

  - Simple music creation

  - Browser-based

  - Perfect for beginners


  **BeepBox**

  - Chiptune music creator

  - Online tool

  - Export options


  ### Sound Effects


  **Audacity**

  - Free audio editing

  - Record and mix

  - Sound effects processing


  **Freesound.org**

  - Creative Commons sounds

  - Large library

  - Community uploads


  **BFXR**

  - Retro sound generator

  - Quick SFX creation

  - Free and simple


  ## Programming


  ### Learning Resources


  **Unity Learn**

  - Official tutorials

  - Project-based learning

  - Completely free


  **Godot Docs**

  - Comprehensive documentation

  - Step-by-step tutorials

  - Community guides


  **Game Programming Patterns**

  - Free online book

  - Essential patterns

  - Best practices


  ### Code Editors


  **VS Code**

  - Free and powerful

  - Extensions for game dev

  - Integrated debugging


  **Rider (for students)**

  - Free for students

  - Excellent Unity support

  - Advanced features


  ## Design & Planning


  ### Game Design Tools


  **Miro**

  - Free tier available

  - Visual collaboration

  - Mind mapping


  **Notion**

  - Free for personal use

  - Project management

  - Documentation


  **Trello**

  - Free kanban boards

  - Task organization

  - Team collaboration


  ### Level Design


  **Tiled**

  - Free tilemap editor

  - Multiple engine support

  - Flexible and powerful


  ## Testing


  ### Playtesting Platforms


  **itch.io**

  - Upload builds for testers

  - Password-protected access

  - Feedback collection


  **Discord Communities**

  - #playtesting channels

  - Direct feedback

  - Community building


  ## Marketing


  ### Social Media


  **Twitter/X**

  - #screenshotsaturday

  - #gamedev community

  - Dev log threads


  **TikTok**

  - Game dev content

  - Behind-the-scenes

  - Short gameplay clips


  **Reddit**

  - r/gamedev

  - r/IndieGaming

  - Game-specific subreddits


  ### Press & Publicity


  **Game Jolt**

  - Free hosting

  - Community features

  - Discovery tools


  **itch.io**

  - Indie-friendly platform

  - Pay-what-you-want options

  - Built-in community


  ## Distribution


  ### PC Platforms


  **itch.io**

  - No fees on free games

  - Flexible pricing

  - Direct to players


  **Steam**

  - $100 submission fee (refundable)

  - Largest PC market

  - Steamworks features


  **Epic Games Store**

  - No submission fee

  - 88% revenue share

  - Growing platform


  ### Mobile


  **Google Play**

  - $25 one-time fee

  - Android distribution

  - In-app purchases


  **Apple App Store**

  - $99/year developer program

  - iOS distribution

  - Global reach


  ## Communities


  ### Forums & Discord


  **Indie Game Developers**

  - Reddit community

  - Daily discussions

  - Feedback Friday


  **Brackeys Discord**

  - Beginner-friendly

  - Active community

  - Collaboration opportunities


  **Godot/Unity Communities**

  - Engine-specific help

  - Asset sharing

  - Collaboration


  ### Game Jams


  **Ludum Dare**

  - Three times per year

  - 48/72 hour jams

  - Large community


  **Global Game Jam**

  - Annual event

  - Physical locations

  - Worldwide participation


  **itch.io Jams**

  - Continuous jams

  - Various themes

  - All skill levels


  ## Business


  ### Legal


  **Creative Commons**

  - Understand licenses

  - Use free resources legally

  - License your work


  **GDPR Compliance**

  - Privacy requirements

  - Data protection

  - EU regulations


  ### Analytics


  **Unity Analytics**

  - Free with Unity

  - Player behavior tracking

  - Revenue analytics


  **GameAnalytics**

  - Free tier

  - Multiple engine support

  - Real-time data


  ## Funding


  **Kickstarter**

  - Crowdfunding platform

  - Build community pre-launch

  - All-or-nothing funding


  **Patreon**

  - Ongoing support

  - Early access benefits

  - Community building


  **Indie Fund**

  - Investment for indie devs

  - Developer-friendly terms


  ## Learning Communities


  **YouTube Channels**

  - Brackeys (archived but useful)

  - Game Maker's Toolkit

  - Mix and Jam

  - Jonas Tyroller


  **Podcasts**

  - Indie Game Business

  - Coffee With Butterscotch

  - Game Dev Field Guide


  ## Success Stories


  Learn from indie successes:

  - Stardew Valley (ConcernedApe)

  - Hollow Knight (Team Cherry)

  - Celeste (Maddy Makes Games)

  - Undertale (Toby Fox)


  ## Tips for Success


  - Start small and finish projects

  - Join game jams regularly

  - Build in public and share progress

  - Focus on one platform initially

  - Iterate based on feedback

  - Network with other developers

  - Learn marketing basics

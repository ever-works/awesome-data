markdown: >-
  ## Overview


  Awesome Kafka is a comprehensive collection of resources for Apache Kafka, the
  distributed event streaming platform used for building real-time data
  pipelines and streaming applications.


  ## Stream Processing


  - **Apache Flink** - Distributed stream processing framework with Kafka
  connectors and exactly-once semantics

  - **Apache Spark Streaming** - Micro-batch stream processing with Kafka
  integration

  - **Apache Samza** - Stream processing framework built specifically for Kafka

  - **Kafka Streams** - Lightweight Java library for stream processing
  applications


  ## Python Streaming Libraries


  - **Faust** - Stream processing library bringing Kafka Streams concepts to
  Python

  - **Quix Streams** - Python library for building Kafka producer/consumer
  applications and complex event-driven systems

  - **Bytewax** - Python stream processing with Rust-level performance

  - **Pathway** - Python ETL framework for real-time processing


  ## Real-Time Databases


  - **RisingWave** - PostgreSQL-compatible streaming database with materialized
  views

  - **Materialize** - Streaming database with incremental view maintenance

  - **Apache Pinot** - Real-time OLAP datastore with sub-second queries on Kafka
  topics

  - **Apache Druid** - Distributed data store for real-time analytics


  ## Change Data Capture (CDC)


  - **Debezium** - CDC platform for MySQL, PostgreSQL, MongoDB, SQL Server,
  Oracle, and more


  ## Features


  - Distributed, fault-tolerant message streaming

  - High throughput and low latency

  - Horizontal scalability

  - Durable storage with configurable retention

  - Stream processing capabilities

  - Ecosystem of connectors and tools


  ## Use Cases


  - Event sourcing and CQRS patterns

  - Real-time analytics and monitoring

  - Log aggregation and metrics collection

  - Microservices communication

  - Data integration and CDC

  - Stream processing applications


  ## Pricing


  Apache Kafka is free and open source. Managed services like Confluent Cloud
  and AWS MSK offer pay-as-you-go pricing based on throughput and storage.
